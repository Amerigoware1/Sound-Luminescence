    /* ========== ROOT VARIABLES ========== */
    :root {
      --sidebar-bg: #14101e;
      --text-color: #e2daeb;
      --accent-color: #9d4edd;
      --accent-hover: #c77dff;
      --border-color: #3c2f5c;
      --meaning-bg: #1b162a;
    }

    /* ========== GLOBAL RESET ========== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      color: var(--text-color);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 320px;
      background-color: #0d0b14;
    }

    /* ========== PROFILE BADGES ========== */
    .profile-indicator {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid var(--border-color);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 15px;
      z-index: 10;
    }
    #zodiac-box { left: 15px; }
    #stone-box { right: 335px; }
    .profile-indicator img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    /* ========== ALTAR TABLE ========== */
    .altar-table {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: auto;
      padding: 100px 20px 20px 20px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========== SPREAD GRID ========== */
    .spread-grid-canvas {
      position: relative;
      width: 100%;
      max-width: 950px;
      min-height: 75vh;
      max-height: 85vh;
      margin: auto;
      display: grid;
      gap: 10px;
      box-sizing: border-box;
      transition: background-image 0.5s ease-in-out;
      z-index: 1;
    }

    .layout-celtic-cross,
    .layout-tree-of-life {
      gap: 8px;
    }

    .spread-grid-canvas > * {
      position: relative;
      z-index: 2;
    }

    /* Grid layouts */
    .layout-single {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }
    .layout-past-present-future {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr;
    }
    .layout-tree-of-life {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }
    .layout-celtic-cross {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    /* Slot labels */
    .slot-label {
      font-size: 0.75rem;
      color: #b0a4c4;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      z-index: 2;
      background: rgba(13, 11, 20, 0.0);
      padding: 2px 6px;
      border-radius: 4px;
      width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spread-slot {
      border: 2px dashed rgba(157, 78, 221, 0.0);
      border-radius: 8px;
      background: rgba(13, 11, 20, 0.0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 6px;
      box-sizing: border-box;
      position: relative;
      text-align: center;
      overflow: visible;
    }

    /* ========== CARDS ========== */
    .tarot-card-wrapper {
      position: relative;
      width: auto;
      height: calc(100% - 8px);
      aspect-ratio: 13 / 22;
      max-width: 100%;
      perspective: 1000px;
      z-index: 5;
      margin: auto auto 4px auto;
      will-change: transform;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), z-index 0s 0.3s;
    }

    /* Hover enlargement - reduced to 2.0 for performance */
    .tarot-card-wrapper:hover {
      transform: scale(2.0);
      z-index: 200;
      transition: transform 0.4s ease-in-out, z-index 0s;
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.9));
    }

    .tarot-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6);
      border-radius: 6px;
    }

    .tarot-card-inner.flipped {
      transform: rotateY(180deg);
    }
    .tarot-card-inner.inverted .card-front img {
      transform: rotateY(180deg) rotate(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      overflow: hidden;
      background-color: transparent;
    }

    .card-back img,
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-front {
      transform: rotateY(180deg);
    }

    /* Runes: square aspect */
    .tarot-card-wrapper[data-tool="runes"] {
      aspect-ratio: 1 / 1;
    }
    .tarot-card-wrapper[data-tool="runes"] .card-front img,
    .tarot-card-wrapper[data-tool="runes"] .card-back img {
      object-fit: contain;
      background-color: transparent;
    }

    /* ========== SIDEBAR ========== */
    .controls-sidebar {
      background-color: var(--sidebar-bg);
      border-left: 2px solid var(--border-color);
      padding: 20px 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      z-index: 20;

    .sidebar-section {

    label {

      text-transform: uppercase;
      letter-spacing: 1px;

    .secondary-btn {

      color: #fff;
      background-color: var(--accent-color);
      box-shadow: 0 2px 8px rgba(157, 78, 221, 0.4);

      const ext = tool === 'tarot' ? '.webp' : '.gif';
      const basePath = tool === 'tarot' ? 'assets/tarot-cards/' : 'assets/runes/';

      deck.forEach(item => {
        const key = typeof item === 'string' ? item : item.key;
        const src = `${basePath}${key}${ext}`;
        if (!IMAGE_CACHE.has(src)) {
          const img = new Image();
          img.src = src;
          img.onerror = () => {
            img.src = 'assets/misc/placeholder.webp';
          };
          IMAGE_CACHE.set(src, img);
        }
      });
    }

    // Preload both decks
    preloadImages(tarotDeck, 'tarot');
    preloadImages(runeKeys, 'runes');

    // Also preload the card back (now .webp)
    (function preloadBack() {
      const back = new Image();
      back.src = 'assets/misc/back.webp';
      back.onerror = () => { back.src = 'assets/misc/placeholder.webp'; };
      IMAGE_CACHE.set('assets/misc/back.webp', back);
    })();

    // =============================================================
    // 4. RUNTIME DECKS & SHUFFLERS
    // =============================================================
    let runtimeDeck = [...tarotDeck];
    let runtimeRunes = [...runeKeys];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function shuffleTarot() {
      runtimeDeck = shuffle([...tarotDeck]);
    }

    function shuffleRunes() {
      runtimeRunes = shuffle([...runeKeys]);
    }

    shuffleTarot();
    shuffleRunes();

    // =============================================================
    // 5. DOM REFS & GLOBALS
    // =============================================================
    const surface = document.getElementById('canvas-surface');
    const sidebar = document.getElementById('meaning-sidebar');
    const dropdown = document.getElementById('spread-matrix');
    const dealBtn = document.getElementById('deal-spread-btn');
    const clearBtn = document.getElementById('clear-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const bdayInput = document.getElementById('user-birthday');

    const spreadLayouts = {
      "single": { class: "layout-single", labels: ["Daily Influence"] },
      "past-present-future": { class: "layout-past-present-future", labels: ["Past / Foundation", "Present / Challenge", "Future / Outcome"] },
      "tree-of-life": { class: "layout-tree-of-life", labels: ["1. Kether (Crown)", "2. Chokmah (Wisdom)", "3. Binah (Understanding)", "4. Chesed (Mercy)", "5. Geburah (Severity)", "6. Tiphereth (Beauty)", "7. Netzach (Victory)", "8. Hod (Glory)", "9. Yesod (Foundation)", "10. Malkuth (Kingdom)"] },
      "celtic-cross": { class: "layout-celtic-cross", labels: ["1. Present Focus", "2. Challenge", "3. Subconscious", "4. Recent Past", "5. Goals", "6. Near Future", "7. Advice", "8. Environment", "9. Hopes/Fears", "10. Outcome"] }
    };

    // =============================================================
    // 6. GENERATE SLOTS
    // =============================================================
    function generateMatrixSlots() {
      surface.innerHTML = '';
      resetSidebar();

      const layoutData = spreadLayouts[dropdown.value];
      surface.className = `spread-grid-canvas ${layoutData.class}`;

      layoutData.labels.forEach(labelText => {
        const slot = document.createElement('div');
        slot.className = 'spread-slot';
        slot.innerHTML = `<div class="slot-label">${labelText}</div>`;
        surface.appendChild(slot);
      });
    }

    function resetSidebar() {
      sidebar.innerHTML = `<p class="meaning-text" style="font-style: italic; color: #a092b8; text-align: center;">Hover your ritual pointer over a face-up card or cosmic badge to look up meanings.</p>`;
    }

    // =============================================================
    // 7. PROFILE UPDATES (Zodiac signs now .webp, birthstones stay .gif)
    // =============================================================
    function updateProfiles() {
      if (!bdayInput.value) return;
      const date = new Date(bdayInput.value + 'T00:00:00');
      const month = date.getMonth() + 1;
      const day = date.getDate();

      // Birthstone – stay .gif
      const stones = ['garnet2.gif', 'amethyst2.gif', 'aquamarine2.gif', 'diamond2.gif',
        'emerald2.gif', 'pearl1.gif', 'ruby2.gif', 'peridot2.gif', 'saphire2.gif',
        'opal2.gif', 'topaz2.gif', 'turquoise.gif'
      ];
      const stoneData = DivinationDatabase.birthstones[month];
      const stoneBox = document.getElementById('stone-box');
      stoneBox.innerHTML = `<img src="assets/birthstones/${stones[month - 1]}" alt="${stoneData.modern}">`;
      stoneBox.setAttribute('data-info',
        `Month: ${stoneData.month} | Modern: ${stoneData.modern} | Mystical: ${stoneData.mystical}\nProperties: ${stoneData.properties}`
      );

      // Zodiac – now .webp
      let signKey = "capricorn";
      let signImg = "capricorn.webp";
      if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) { signKey = "aquarius";
        signImg = "aquarius.webp"; } else if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) { signKey =
          "pisces";
        signImg = "pisces.webp"; } else if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) { signKey = "aries";
        signImg = "aries.webp"; } else if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) { signKey = "taurus";
        signImg = "taurus.webp"; } else if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) { signKey = "gemini";
        signImg = "gemini.webp"; } else if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) { signKey = "cancer";
        signImg = "cancer.webp"; } else if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) { signKey = "leo";
        signImg = "leo.webp"; } else if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) { signKey = "virgo";
        signImg = "virgo.webp"; } else if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) { signKey = "libra";
        signImg = "libra.webp"; } else if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) { signKey = "scorpio";
        signImg = "scorpio.webp"; } else if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) { signKey =
          "sagittarius";
        signImg = "sagittarius.webp"; }

      const zodiacData = DivinationDatabase.zodiac[signKey];
      const zodiacBox = document.getElementById('zodiac-box');
      zodiacBox.innerHTML = `<img src="assets/signs/${signImg}" alt="${zodiacData.name}">`;
      zodiacBox.setAttribute('data-info', `${zodiacData.name} (${zodiacData.element})\nTraits: ${zodiacData.traits}`);
    }

    // Hover badge → sidebar
    [document.getElementById('zodiac-box'), document.getElementById('stone-box')].forEach(box => {
      box.addEventListener('mouseenter', () => {
        const info = box.getAttribute('data-info');
        sidebar.innerHTML = `
          <h4 class="meaning-title">Cosmic Alignment</h4>
          <p class="meaning-text" style="white-space: pre-line;">${info}</p>
        `;
      });
      box.addEventListener('mouseleave', resetSidebar);
    });

    bdayInput.addEventListener('change', updateProfiles);

    // =============================================================
    // 8. CARD CREATION (caching + fallback .webp)
    // =============================================================
    function getCachedImage(src) {
      if (!IMAGE_CACHE.has(src)) {
        const img = new Image();
        img.src = src;
        img.onerror = () => {
          img.src = 'assets/misc/placeholder.webp';
        };
        IMAGE_CACHE.set(src, img);
      }
      return IMAGE_CACHE.get(src);
    }

    function createCardElement(assetFile, assetKey, isInverted, slotLabel, activeTool) {
      const wrapper = document.createElement('div');
      wrapper.className = 'tarot-card-wrapper';
      wrapper.setAttribute('data-key', assetKey);
      wrapper.setAttribute('data-tool', activeTool);
      wrapper.setAttribute('data-inverted', isInverted);
      wrapper.setAttribute('data-position', slotLabel);

      // Inner structure – back card now .webp
      wrapper.innerHTML = `
        <div class="tarot-card-inner">
          <div class="card-back"><img src="assets/misc/back.webp" loading="lazy" alt="card back"></div>
          <div class="card-front"></div>
        </div>
      `;

      // Front image – use cached clone
      const cachedImg = getCachedImage(assetFile);
      const imgClone = cachedImg.cloneNode(true);
      imgClone.loading = 'lazy';
      imgClone.alt = assetKey.replace(/-/g, ' ');
      wrapper.querySelector('.card-front').appendChild(imgClone);

      // Hover meaning
      wrapper.addEventListener('mouseenter', () => {
        const key = wrapper.getAttribute('data-key');
        const tool = wrapper.getAttribute('data-tool');
        const inverted = wrapper.getAttribute('data-inverted') === 'true';
        const pos = wrapper.getAttribute('data-position');

        let title = "";
        let uprightText = "";
        let reversedText = "";

        if (tool === 'tarot') {
          const info = DivinationDatabase.tarot[key] || { name: key.replace(/-/g, ' '), upright: "Esoteric definitions online.",
            reversed: "Inverted alignment active." };
          title = info.name;
          uprightText = info.upright;
          reversedText = info.reversed;
        } else {
          const dbKey = key === "nauthiz" ? "nauthiz" : key;
          const info = DivinationDatabase.runes[dbKey] || { name: key, upright: "Runic energy casting.",
            reversed: "Symmetrical layout alignment." };
          title = info.name;
          uprightText = info.upright;
          reversedText = info.reversed;
        }

        sidebar.innerHTML = `
          <h4 class="meaning-title" style="text-transform: capitalize;">${title}</h4>
          <div style="font-size: 0.75rem; color:#a092b8;">Location: ${pos}</div>
          <div class="meaning-orientation ${inverted ? 'orientation-reversed' : 'orientation-upright'}">
            ${inverted ? 'Reversed / Merkstave' : 'Upright Alignment'}
          </div>
          <p class="meaning-text">${inverted ? reversedText : uprightText}</p>
        `;
      });

      wrapper.addEventListener('mouseleave', resetSidebar);

      return wrapper;
    }

    // =============================================================
    // 9. DEAL SPREAD (BATCHED DOM UPDATES)
    // =============================================================
    dealBtn.addEventListener('click', () => {
      const slots = document.querySelectorAll('.spread-slot');
      const activeTool = document.getElementById('divination-tool').value;
      const fragment = document.createDocumentFragment();
      const cardsToFlip = [];

      slots.forEach((slot, idx) => {
        if (slot.querySelector('.tarot-card-wrapper')) return;

        let assetFile = "";
        let assetKey = "";
        let isInverted = false;

        if (activeTool === 'tarot') {
          if (runtimeDeck.length === 0) {
            shuffleTarot();
          }
          const cardData = runtimeDeck.pop();
          assetKey = cardData.key;
          assetFile = `assets/tarot-cards/${cardData.file}`; // .webp
          isInverted = Math.random() >= 0.5;
        } else {
          // Runes – stay .gif
          if (runtimeRunes.length === 0) {
            shuffleRunes();
          }
          assetKey = runtimeRunes.pop();
          assetFile = `assets/runes/${assetKey}.gif`;
          const dbKey = assetKey === "nauthiz" ? "nauthiz" : assetKey;
          const info = DivinationDatabase.runes[dbKey];
          if (info && info.reversed.includes("cannot be inverted")) {
            isInverted = false;
          } else {
            isInverted = Math.random() >= 0.5;
          }
        }

        const slotLabel = slot.querySelector('.slot-label').innerText;
        const wrapper = createCardElement(assetFile, assetKey, isInverted, slotLabel, activeTool);
        slot.appendChild(wrapper);
        cardsToFlip.push({ wrapper, idx });
      });

      // Flip with staggered delay
      cardsToFlip.forEach(({ wrapper, idx }) => {
        setTimeout(() => {
          const inner = wrapper.querySelector('.tarot-card-inner');
          if (inner) {
            if (wrapper.getAttribute('data-inverted') === 'true') {
              inner.classList.add('inverted');
            }
            inner.classList.add('flipped');
          }
        }, idx * 150 + 100);
      });
    });

    // =============================================================
    // 10. CLEAR & SHUFFLE
    // =============================================================
    clearBtn.addEventListener('click', () => {
      generateMatrixSlots();
      shuffleRunes();
      shuffleTarot();
    });

    shuffleBtn.addEventListener('click', () => {
      shuffleTarot();
      shuffleRunes();
      sidebar.innerHTML = `<p class="meaning-text" style="color: #c77dff;">🔮 Decks have been reshuffled.</p>`;
      setTimeout(resetSidebar, 2000);
    });

    // =============================================================
    // 11. CLOTH & CURSOR SETUP (cloth now .webp, cursor stays .cur)
    // =============================================================
    window.addEventListener('DOMContentLoaded', () => {
      // Cloth now defaults to .webp
      const savedCloth = localStorage.getItem('selectedCloth') || 'assets/cloths/cloth-1.webp';
      const savedCursor = localStorage.getItem('selectedCursor') || 'assets/cursors/cursor-1.cur';

      let cleanCloth = savedCloth.startsWith('assets') ? savedCloth : savedCloth.substring(savedCloth.indexOf('assets'));
      let cleanCursor = savedCursor.startsWith('assets') ? savedCursor : savedCursor.substring(savedCursor.indexOf('assets'));

      const repoPath = window.location.pathname.includes('/Sound-Luminescence/') ? '/Sound-Luminescence/' : '/';

      document.body.style.backgroundColor = '#0d0b14';
      document.body.style.backgroundImage = 'none';

      const altar = document.getElementById('altar-table');
      if (altar) {
        altar.style.background = `linear-gradient(rgba(13, 11, 20, 0.3), rgba(13, 11, 20, 0.3)), url('${repoPath}${cleanCloth}')`;
        altar.style.backgroundSize = 'cover';
        altar.style.backgroundPosition = 'center';
        altar.style.backgroundRepeat = 'no-repeat';
        altar.style.borderRadius = '8px';
        altar.style.boxShadow = 'inset 0 0 30px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.5)';
      }

      const style = document.createElement('style');
      style.innerHTML = `* { cursor: url('${repoPath}${cleanCursor}'), auto !important; }`;
      document.head.appendChild(style);

      updateProfiles();
      generateMatrixSlots();
    });

    // =============================================================
    // 12. DROPDOWN CHANGE → REGENERATE SLOTS
    // =============================================================
    dropdown.addEventListener('change', generateMatrixSlots);

    // =============================================================
    // 13. INITIAL SIDEBAR MESSAGE
    // =============================================================
    resetSidebar();
  </script>
</body>
</html>
