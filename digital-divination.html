    /* ========== ROOT VARIABLES ========== */
    :root {
      --sidebar-bg: #14101e;
      --text-color: #e2daeb;
      --accent-color: #9d4edd;
      --accent-hover: #c77dff;
      --border-color: #3c2f5c;
      --meaning-bg: #1b162a;
    }

    /* ========== GLOBAL RESET ========== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      color: var(--text-color);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 320px;
      background-color: #0d0b14;
    }

    /* ========== PROFILE BADGES ========== */
    .profile-indicator {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid var(--border-color);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 15px;
      z-index: 10;
    }
    #zodiac-box { left: 15px; }
    #stone-box { right: 335px; }
    .profile-indicator img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    /* ========== ALTAR TABLE ========== */
    .altar-table {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: auto;
      padding: 100px 20px 20px 20px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========== SPREAD GRID ========== */
    .spread-grid-canvas {
      position: relative;
      width: 100%;
      max-width: 950px;
      min-height: 75vh;
      max-height: 85vh;
      margin: auto;
      display: grid;
      gap: 10px;
      box-sizing: border-box;
      transition: background-image 0.5s ease-in-out;
      z-index: 1;
    }

    .layout-celtic-cross,
    .layout-tree-of-life {
      gap: 8px;
    }

    .spread-grid-canvas > * {
      position: relative;
      z-index: 2;
    }

    /* Grid layouts */
    .layout-single {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }
    .layout-past-present-future {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr;
    }
    .layout-tree-of-life {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }
    .layout-celtic-cross {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    /* Slot labels */
    .slot-label {
      font-size: 0.75rem;
      color: #b0a4c4;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      z-index: 2;
      background: rgba(13, 11, 20, 0.0);
      padding: 2px 6px;
      border-radius: 4px;
      width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spread-slot {
      border: 2px dashed rgba(157, 78, 221, 0.0);
      border-radius: 8px;
      background: rgba(13, 11, 20, 0.0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 6px;
      box-sizing: border-box;
      position: relative;
      text-align: center;
      overflow: visible;
    }

    /* ========== CARDS ========== */
    .tarot-card-wrapper {
      position: relative;
      width: auto;
      height: calc(100% - 8px);
      aspect-ratio: 13 / 22;
      max-width: 100%;
      perspective: 1000px;
      z-index: 5;
      margin: auto auto 4px auto;
      will-change: transform;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), z-index 0s 0.3s;
    }

    /* Hover enlargement - reduced to 2.0 for performance */
    .tarot-card-wrapper:hover {
      transform: scale(2.0);
      z-index: 200;
      transition: transform 0.4s ease-in-out, z-index 0s;
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.9));
    }

    .tarot-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6);
      border-radius: 6px;
    }

    .tarot-card-inner.flipped {
      transform: rotateY(180deg);
    }
    .tarot-card-inner.inverted .card-front img {
      transform: rotateY(180deg) rotate(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      overflow: hidden;
      background-color: transparent;
    }

    .card-back img,
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-front {
      transform: rotateY(180deg);
    }

    /* Runes: square aspect */
    .tarot-card-wrapper[data-tool="runes"] {
      aspect-ratio: 1 / 1;
    }
    .tarot-card-wrapper[data-tool="runes"] .card-front img,
    .tarot-card-wrapper[data-tool="runes"] .card-back img {
      object-fit: contain;
      background-color: transparent;
    }

    /* ========== SIDEBAR ========== */
    .controls-sidebar {
      background-color: var(--sidebar-bg);
      border-left: 2px solid var(--border-color);
      padding: 20px 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      z-index: 20;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-hover);
    }
    input,
    select {
      background-color: #09070e;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px;
      border-radius: 4px;
      font-family: inherit;

    button {
      background-color: var(--accent-color);
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      border-radius: 4px;
      cursor: pointer;

    button:hover {
      background-color: var(--accent-hover);
    }
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;

    .secondary-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
    }
    .secondary-btn:hover {
      background: rgba(157, 78, 221, 0.15);
      border-color: var(--accent-hover);

    .meaning-panel {
      background-color: var(--meaning-bg);
      border: 1px dashed var(--border-color);
      border-radius: 6px;
      padding: 12px;
      min-height: 150px;

    .meaning-title {
      font-size: 1.1rem;

      color: #fff;
      background-color: var(--accent-color);
      box-shadow: 0 2px 8px rgba(157, 78, 221, 0.4);

      "algiz", "ansuz", "berkano", "dagaz", "ehwaz", "eihwaz", "fehu", "gebo",
      "hagalaz", "ingwaz", "isa", "jera", "kenaz", "laguz", "mannaz", "nauthiz",

    // =============================================================
    // 3. PRELOAD ALL IMAGES (CACHING)
    // =============================================================
    const IMAGE_CACHE = new Map();

    function preloadImages(deck, tool = 'tarot') {
      // Tarot uses .webp, runes stay .webp
      const ext = tool === 'tarot' ? '.webp' : '.webp';
      const basePath = tool === 'tarot' ? 'assets/tarot-cards/' : 'assets/runes/';

      deck.forEach(item => {
        const key = typeof item === 'string' ? item : item.key;
        const src = `${basePath}${key}${ext}`;
        if (!IMAGE_CACHE.has(src)) {
          const img = new Image();
          img.src = src;
          img.onerror = () => {
            img.src = 'assets/misc/placeholder.webp';
          };
          IMAGE_CACHE.set(src, img);
        }
      });
    }

    // Preload both decks
    preloadImages(tarotDeck, 'tarot');
    preloadImages(runeKeys, 'runes');

    // Also preload the card back (now .webp)
    (function preloadBack() {
      const back = new Image();
      back.src = 'assets/misc/back.webp';
      back.onerror = () => { back.src = 'assets/misc/placeholder.webp'; };
      IMAGE_CACHE.set('assets/misc/back.webp', back);
    })();

    // =============================================================
    // 4. RUNTIME DECKS & SHUFFLERS
    // =============================================================
    let runtimeDeck = [...tarotDeck];
    let runtimeRunes = [...runeKeys];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function shuffleTarot() {
      runtimeDeck = shuffle([...tarotDeck]);
    }

    function shuffleRunes() {
      runtimeRunes = shuffle([...runeKeys]);
    }

    shuffleTarot();

// =============================================================
// 2. REPLACE THE GENERATE SLOTS FUNCTION
// =============================================================
function generateMatrixSlots() {
  const surface = document.getElementById('canvas-surface');
  surface.innerHTML = '';
  resetSidebar();

  // Clear any old grid classes and set up absolute positioning
  surface.className = 'spread-grid-canvas';
  surface.style.position = 'relative';
  surface.style.width = '100%';
  surface.style.height = '100%';
  surface.style.minHeight = '70vh';

  const layoutKey = document.getElementById('spread-matrix').value;
  const layout = LAYOUTS[layoutKey];

  if (!layout) return;

  layout.slots.forEach(slotData => {
    const slot = document.createElement('div');
    slot.className = 'spread-slot';
    slot.dataset.id = slotData.id;
    
    // --- ABSOLUTE POSITIONING MAGIC ---
    slot.style.position = 'absolute';
    slot.style.left = slotData.x + '%';
    slot.style.top = slotData.y + '%';
    slot.style.transform = `translate(-50%, -50%) rotate(${slotData.rotate || 0}deg)`;
    slot.style.width = '22%'; // Base size for tarot
    slot.style.maxWidth = '180px';
    slot.style.aspectRatio = '13 / 22'; // Tarot aspect ratio
    slot.style.margin = '0';
    slot.style.padding = '0';
    slot.style.border = 'none';
    slot.style.background = 'none';
    slot.style.display = 'flex';
    slot.style.alignItems = 'center';
    slot.style.justifyContent = 'center';
    slot.style.zIndex = slotData.id; // Ensures proper layering (1 is bottom, 10 is top)

    // Slot Label (Positioned below the card)
    const label = document.createElement('div');
    label.className = 'slot-label';
    label.innerText = slotData.label;
    label.style.position = 'absolute';
    label.style.bottom = '-25px';
    label.style.left = '50%';
    label.style.transform = 'translateX(-50%)';
    label.style.whiteSpace = 'nowrap';
    label.style.fontSize = '0.7rem';
    label.style.color = '#b0a4c4';
    label.style.textShadow = '1px 1px 2px #000';
    label.style.pointerEvents = 'none';
    slot.appendChild(label);

    surface.appendChild(slot);
  });
}

// 3. UPDATE THE DEAL LOGIC (Works with the new slots)
// =============================================================
document.getElementById('deal-spread-btn').addEventListener('click', () => {
  const slots = document.querySelectorAll('.spread-slot');
  const activeTool = document.getElementById('divination-tool').value;
  
  // Adjust card size for runes (square)
  const cardSize = activeTool === 'runes' ? '18%' : '22%';
  slots.forEach(slot => {
    slot.style.width = cardSize;
    if (activeTool === 'runes') {
      slot.style.aspectRatio = '1 / 1';
    } else {
      slot.style.aspectRatio = '13 / 22';
    }
  });

  slots.forEach((slot, idx) => {
    // Clear previous card if any
    const oldWrapper = slot.querySelector('.tarot-card-wrapper');
    if (oldWrapper) oldWrapper.remove();

    let assetFile = "";
    let assetKey = "";
    let isInverted = false;

    if (activeTool === 'tarot') {
      if (runtimeDeck.length === 0) shuffleTarot();
      const cardData = runtimeDeck.pop();
      assetKey = cardData.key;
      assetFile = `assets/tarot-cards/${cardData.file}`;
      isInverted = Math.random() >= 0.5;
    } else {
      if (runtimeRunes.length === 0) shuffleRunes();
      assetKey = runtimeRunes.pop();
      assetFile = `assets/runes/${assetKey}.gif`;
      const dbKey = assetKey === "nauthiz" ? "nauthiz" : assetKey;
      const info = DivinationDatabase.runes[dbKey];
      if (info && info.reversed.includes("cannot be inverted")) {
        isInverted = false;
      } else {
        isInverted = Math.random() >= 0.5;
      }
    }

    const slotLabel = slot.querySelector('.slot-label')?.innerText || `Position ${idx + 1}`;
    const wrapper = createCardElement(assetFile, assetKey, isInverted, slotLabel, activeTool);
    
    // Ensure wrapper fills the slot
    wrapper.style.width = '100%';
    wrapper.style.height = '100%';
    wrapper.style.margin = '0';
    
    slot.appendChild(wrapper);

    // Flip animation
    setTimeout(() => {
      const inner = wrapper.querySelector('.tarot-card-inner');
      if (inner) {
        if (isInverted) inner.classList.add('inverted');
        inner.classList.add('flipped');
      }
    }, idx * 150 + 100);
  });
});
