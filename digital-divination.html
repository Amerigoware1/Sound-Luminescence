      position: relative;
      height: 100vh;
      width: 100%;
      overflow: auto;
      padding: 100px 20px 20px 20px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========== SPREAD GRID ========== */
    .spread-grid-canvas {
      position: relative;
      width: 100%;
      max-width: 950px;
      min-height: 75vh;
      max-height: 85vh;
      margin: auto;
      display: grid;
      gap: 10px;
      box-sizing: border-box;
      transition: background-image 0.5s ease-in-out;
      z-index: 1;
    }

    .layout-celtic-cross,
    .layout-tree-of-life {
      gap: 8px;
    }

      position: relative;
      z-index: 2;
    } */

    .spread-slot {
      border: 2px dashed rgba(157, 78, 221, 0.0);
      border-radius: 8px;
      background: rgba(13, 11, 20, 0.0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 6px;
      box-sizing: border-box;
      position: relative;
      text-align: center;
      overflow: visible;
    }

    .spread-slot:hover {
      z-index: 1000 !important;
    }

    /* ========== CARDS ========== */
    .tarot-card-wrapper {
      position: relative;
      width: auto;
      height: calc(100% - 16px);
      aspect-ratio: 13 / 22;
      max-width: 55%;
      max-height: 55%;
      perspective: 1000px;
      z-index: 5;
      margin: auto auto 4px auto;
      will-change: transform;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), z-index 0s 0.3s;
    }

    .tarot-card-wrapper:hover {
      transform: scale(2.0);
      z-index: 999;
      transition: transform 0.4s ease-in-out, z-index 0s;
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.9));
    }

    .tarot-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6);
      border-radius: 6px;
    }

    .tarot-card-inner.flipped {
      transform: rotateY(180deg);
    }

    .tarot-card-inner.inverted .card-front img {
      transform: rotateY(180deg) rotate(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      overflow: hidden;
      background-color: transparent;
    }

    .card-back img,
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-front {
      transform: rotateY(180deg);
    }

    /* Runes: square aspect */
    .tarot-card-wrapper[data-tool="runes"] {
      aspect-ratio: 1 / 1;
    }

    .tarot-card-wrapper[data-tool="runes"] .card-back img {
      object-fit: contain;
      background-color: transparent;

            upright: card.meaning_up || "No upright meaning.",
            reversed: card.meaning_rev || "No reversed meaning.",
            suit: card.suit || 'major',
            value: card.value,
            desc: card.desc || ""
          };
          // Build deck entry with filename derived from name
          deck.push({
            key: key,
            file: cardNameToFilename(card.name),
            name: card.name,
            suit: card.suit || 'major'
          });
        });

        tarotDeck = deck;
        runtimeDeck = shuffle([...tarotDeck]);
        tarotDataLoaded = true;
        console.log(`✅ Loaded ${tarotDeck.length} tarot cards from JSON.`);
        return true;
      } catch (error) {
        console.warn('⚠️ Tarot JSON load failed:', error);
        // Fallback: create a minimal deck using hardcoded majors? But we'll just keep empty.
        tarotDataLoaded = false;
        return false;
      }
    }

    // =============================================================
    // 4. RUNE DECK – build from DivinationDatabase.runes
    // =============================================================
    const runeKeys = Object.keys(DivinationDatabase.runes);
    let runtimeRunes = shuffle([...runeKeys]);

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function shuffleTarot() {
      if (tarotDeck.length) runtimeDeck = shuffle([...tarotDeck]);
    }

    function shuffleRunes() {
      runtimeRunes = shuffle([...runeKeys]);
    }

    // =============================================================
    // 5. PRELOAD IMAGES (tarot + runes)
    // =============================================================
    const IMAGE_CACHE = new Map();

    function getCachedImage(src) {
      if (!IMAGE_CACHE.has(src)) {
        const img = new Image();
        img.src = src;
        img.onerror = () => {
          img.src = 'assets/misc/placeholder.webp';
        };
        IMAGE_CACHE.set(src, img);
      }
      return IMAGE_CACHE.get(src);
    }

    function preloadImages() {
      // Tarot – after loaded
      if (tarotDataLoaded) {
        tarotDeck.forEach(card => {
          const src = `assets/tarot-cards/${card.file}`;
          if (!IMAGE_CACHE.has(src)) {
            const img = new Image();
            img.src = src;
            img.onerror = () => { img.src = 'assets/misc/placeholder.webp'; };
            IMAGE_CACHE.set(src, img);
          }
        });
      }
      // Runes – .webp
      runeKeys.forEach(key => {
        const src = `assets/runes/${key}.webp`;
        if (!IMAGE_CACHE.has(src)) {
          const img = new Image();
          img.src = src;
          img.onerror = () => { img.src = 'assets/misc/placeholder.webp'; };
          IMAGE_CACHE.set(src, img);
        }
      });
      // Card back
      const backSrc = 'assets/misc/back.webp';
      if (!IMAGE_CACHE.has(backSrc)) {
        const img = new Image();
        img.src = backSrc;
        img.onerror = () => { img.src = 'assets/misc/placeholder.webp'; };
        IMAGE_CACHE.set(backSrc, img);
      }
    }

    // =============================================================
    // 6. DOM REFERENCES (will be set in DOMContentLoaded)
    // =============================================================
    let bdayInput, sidebar, surface, dealBtn, clearBtn, shuffleBtn, dropdown;

    // =============================================================
    // 7. GENERATE SLOTS (absolute positioning)
    // =============================================================
    function generateMatrixSlots() {
      if (!surface) return;
      surface.innerHTML = '';
      resetSidebar();

      surface.className = 'spread-grid-canvas';
      surface.style.position = 'relative';
      surface.style.width = '100%';
      surface.style.height = '100%';
      surface.style.minHeight = '70vh';

      const layoutKey = dropdown.value;
      const layout = LAYOUTS[layoutKey];
      if (!layout) return;

      layout.slots.forEach(slotData => {
        const slot = document.createElement('div');
        slot.className = 'spread-slot';
        slot.dataset.id = slotData.id;

        slot.style.position = 'absolute';
        slot.style.left = slotData.x + '%';
        slot.style.top = slotData.y + '%';
        slot.style.transform = `translate(-50%, -50%) rotate(${slotData.rotate || 0}deg)`;
        // Size will be set in deal based on tool
        slot.style.width = '18%';
        slot.style.maxWidth = '140px';
        slot.style.aspectRatio = '13 / 22';
        slot.style.margin = '0';
        slot.style.padding = '0';
        slot.style.border = 'none';
        slot.style.background = 'none';
        slot.style.display = 'flex';
        slot.style.alignItems = 'center';
        slot.style.justifyContent = 'center';
        slot.dataset.originalZ = slotData.id;
        slot.style.zIndex = slotData.id;

        const label = document.createElement('div');
        label.className = 'slot-label';
        label.innerText = slotData.label;
        label.style.position = 'absolute';
        label.style.bottom = '-25px';
        label.style.left = '50%';
        label.style.transform = 'translateX(-50%)';
        label.style.whiteSpace = 'nowrap';
        label.style.fontSize = '0.7rem';
        label.style.color = '#b0a4c4';
        label.style.textShadow = '1px 1px 2px #000';
        label.style.pointerEvents = 'none';
        slot.appendChild(label);

        surface.appendChild(slot);
      });
    }

    // =============================================================
    // 8. CARD CREATION
    // =============================================================
    function createCardElement(assetFile, assetKey, isInverted, slotLabel, activeTool) {
      const wrapper = document.createElement('div');
      wrapper.className = 'tarot-card-wrapper';
      wrapper.setAttribute('data-key', assetKey);
      wrapper.setAttribute('data-tool', activeTool);
      wrapper.setAttribute('data-inverted', isInverted);
      wrapper.setAttribute('data-position', slotLabel);

      const isRune = activeTool === 'runes';
      const backStyle = isRune ? 'style="opacity:0; pointer-events:none;"' : '';

      wrapper.innerHTML = `
        <div class="tarot-card-inner">
          <div class="card-back" ${backStyle}>
            <img src="assets/misc/back.webp" loading="lazy" alt="card back">
          </div>
          <div class="card-front"></div>
        </div>
      `;

      const cachedImg = getCachedImage(assetFile);
      const imgClone = cachedImg.cloneNode(true);
      imgClone.loading = 'lazy';
      imgClone.alt = assetKey.replace(/-/g, ' ');
      wrapper.querySelector('.card-front').appendChild(imgClone);

      // Hover meaning
      wrapper.addEventListener('mouseenter', () => {
        const key = wrapper.getAttribute('data-key');
        const tool = wrapper.getAttribute('data-tool');
        const inverted = wrapper.getAttribute('data-inverted') === 'true';
        const pos = wrapper.getAttribute('data-position');

        let title = "";
        let uprightText = "";
        let reversedText = "";

        if (tool === 'tarot') {
          const info = DivinationDatabase.tarot[key];
          if (info) {
            title = info.name;
            uprightText = info.upright || "No upright meaning.";
            reversedText = info.reversed || "No reversed meaning.";
          } else {
            title = key.replace(/-/g, ' ');
            uprightText = "Card data not loaded.";
            reversedText = "Card data not loaded.";
          }
        } else {
          // Runes
          const dbKey = key === "nauthiz" ? "nauthiz" : key;
          const info = DivinationDatabase.runes[dbKey];
          if (info) {
            title = info.name;
            uprightText = info.upright;
            reversedText = info.reversed;
          } else {
            title = key;
            uprightText = "Rune data missing.";
            reversedText = "Rune data missing.";
          }
        }
        const slot = wrapper.closest('.spread-slot');
        if (slot) {
          slot.style.zIndex = 1000;
          // Also optionally store original z-index to restore later
          slot.dataset.originalZ = slot.style.zIndex || slot.dataset.id || 5;
        }
        sidebar.innerHTML = `
          <h4 class="meaning-title" style="text-transform: capitalize;">${title}</h4>
          <div style="font-size: 0.75rem; color:#a092b8;">Location: ${pos}</div>
          <div class="meaning-orientation ${inverted ? 'orientation-reversed' : 'orientation-upright'}">
            ${inverted ? 'Reversed / Merkstave' : 'Upright Alignment'}
          </div>
          <p class="meaning-text">${inverted ? reversedText : uprightText}</p>
        `;
      });

      wrapper.addEventListener('mouseleave', resetSidebar);
      const slot = wrapper.closest('.spread-slot');
      if (slot) {
        const originalZ = slot.dataset.originalZ || slot.dataset.id || 5;
        slot.style.zIndex = originalZ;
      }
      return wrapper;
    }

    // =============================================================
    // 9. DEAL SPREAD
    // =============================================================
    function dealSpread() {
      const slots = document.querySelectorAll('.spread-slot');
      const layoutKey = dropdown.value;
      const layout = LAYOUTS[layoutKey];
      if (!layout) return;

      // Determine tool from layout, fallback to global selection
      const activeTool = layout.tool || document.getElementById('divination-tool').value;

      // Adjust slot size and aspect ratio
      const cardSize = activeTool === 'runes' ? '18%' : '22%';
      slots.forEach(slot => {
        slot.style.width = cardSize;
        if (activeTool === 'runes') {
          slot.style.aspectRatio = '1 / 1';
        } else {
          slot.style.aspectRatio = '13 / 22';
        }
      });

      slots.forEach((slot, idx) => {
        // Clear previous card
        const oldWrapper = slot.querySelector('.tarot-card-wrapper');
        if (oldWrapper) oldWrapper.remove();

        let assetFile = "";
        let assetKey = "";
        let isInverted = false;

        if (activeTool === 'tarot') {
          if (!tarotDataLoaded) {
            // Fallback: try to load data again? Or show error.
            sidebar.innerHTML = `<p class="meaning-text" style="color: #f87171;">Tarot data not loaded. Please refresh.</p>`;
            return;
          }
          if (runtimeDeck.length === 0) shuffleTarot();
          const cardData = runtimeDeck.pop();
          assetKey = cardData.key;
          assetFile = `assets/tarot-cards/${cardData.file}`;
          isInverted = Math.random() >= 0.5;
        } else {
          // Runes
          if (runtimeRunes.length === 0) shuffleRunes();
          assetKey = runtimeRunes.pop();
          assetFile = `assets/runes/${assetKey}.webp`; // now .webp
          // Check if rune can be inverted
          const info = DivinationDatabase.runes[assetKey];
          if (info && info.reversed.includes("cannot be inverted")) {
            isInverted = false;
          } else {
            isInverted = Math.random() >= 0.5;
          }
        }

        const slotLabel = slot.querySelector('.slot-label')?.innerText || `Position ${idx + 1}`;
        const wrapper = createCardElement(assetFile, assetKey, isInverted, slotLabel, activeTool);

        wrapper.style.width = '100%';
        wrapper.style.height = '100%';
        wrapper.style.margin = '0';

        slot.appendChild(wrapper);

        // Flip animation
        setTimeout(() => {
          const inner = wrapper.querySelector('.tarot-card-inner');
          if (inner) {
            if (isInverted) inner.classList.add('inverted');
            // For runes, flip instantly; tarot gets staggered
            inner.classList.add('flipped');
          }
        }, activeTool === 'runes' ? 50 : idx * 150 + 100);
      });
    }

    // =============================================================
    // 10. SIDEBAR & PROFILE UPDATES
    // =============================================================
    function resetSidebar() {
      if (!sidebar) return;
      sidebar.innerHTML = `<p class="meaning-text" style="font-style: italic; color: #a092b8; text-align: center;">Hover your ritual pointer over a face-up card or cosmic badge to look up meanings.</p>`;
    }

    function updateProfiles() {
      if (!bdayInput) return;
      if (!bdayInput.value) return;
      const date = new Date(bdayInput.value + 'T00:00:00');
      const month = date.getMonth() + 1;
      const day = date.getDate();

      const stones = ['garnet2.gif', 'amethyst2.gif', 'aquamarine2.gif', 'diamond2.gif',
        'emerald2.gif', 'pearl1.gif', 'ruby2.gif', 'peridot2.gif', 'saphire2.gif',
        'opal2.gif', 'topaz2.gif', 'turquoise.gif'
      ];
      const stoneData = DivinationDatabase.birthstones[month];
      const stoneBox = document.getElementById('stone-box');
      if (stoneBox) {
        stoneBox.innerHTML = `<img src="assets/birthstones/${stones[month - 1]}" alt="${stoneData.modern}">`;
        stoneBox.setAttribute('data-info',
          `Month: ${stoneData.month} | Modern: ${stoneData.modern} | Mystical: ${stoneData.mystical}\nProperties: ${stoneData.properties}`
        );
      }

      let signKey = "capricorn";
      let signImg = "capricorn.webp";
      if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) {
        signKey = "aquarius";
        signImg = "aquarius.webp";
      } else if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) {
        signKey =
        "pisces";
        signImg = "pisces.webp";
      } else if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) {
        signKey = "aries";
        signImg = "aries.webp";
      } else if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) {
        signKey = "taurus";
        signImg = "taurus.webp";
      } else if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) {
        signKey = "gemini";
        signImg = "gemini.webp";
      } else if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) {
        signKey = "cancer";
        signImg = "cancer.webp";
      } else if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) {
        signKey = "leo";
        signImg = "leo.webp";
      } else if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) {
        signKey = "virgo";
        signImg = "virgo.webp";
      } else if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) {
        signKey = "libra";
        signImg = "libra.webp";
      } else if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) {
        signKey = "scorpio";
        signImg = "scorpio.webp";
      } else if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) {
        signKey =
        "sagittarius";
        signImg = "sagittarius.webp";
      }

      const zodiacData = DivinationDatabase.zodiac[signKey];
      const zodiacBox = document.getElementById('zodiac-box');
      if (zodiacBox) {
        zodiacBox.innerHTML = `<img src="assets/signs/${signImg}" alt="${zodiacData.name}">`;
        zodiacBox.setAttribute('data-info', `${zodiacData.name} (${zodiacData.element})\nTraits: ${zodiacData.traits}`);
      }
    }

    // =============================================================
    // 11. CLOTH & CURSOR SETUP
    // =============================================================
    function setupClothAndCursor() {
      const savedCloth = localStorage.getItem('selectedCloth') || 'assets/cloths/cloth-1.webp';
      const savedCursor = localStorage.getItem('selectedCursor') || 'assets/cursors/cursor-1.cur';

      let cleanCloth = savedCloth.startsWith('assets') ? savedCloth : savedCloth.substring(savedCloth.indexOf('assets'));
      let cleanCursor = savedCursor.startsWith('assets') ? savedCursor : savedCursor.substring(savedCursor.indexOf('assets'));

      // Upgrade old .jpg to .webp
      if (cleanCloth.endsWith('.jpg')) {
        cleanCloth = cleanCloth.replace(/\.jpg$/, '.webp');
        localStorage.setItem('selectedCloth', cleanCloth);
      }

      const repoPath = window.location.pathname.includes('/Sound-Luminescence/') ? '/Sound-Luminescence/' : '/';

      document.body.style.backgroundColor = '#0d0b14';
      document.body.style.backgroundImage = 'none';

      const altar = document.getElementById('altar-table');
      if (altar) {
        altar.style.background = `linear-gradient(rgba(13, 11, 20, 0.3), rgba(13, 11, 20, 0.3)), url('${repoPath}${cleanCloth}')`;
        altar.style.backgroundSize = 'cover';
        altar.style.backgroundPosition = 'center';
        altar.style.backgroundRepeat = 'no-repeat';
        altar.style.borderRadius = '8px';
        altar.style.boxShadow = 'inset 0 0 30px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.5)';
      }

      const style = document.createElement('style');
      style.innerHTML = `* { cursor: url('${repoPath}${cleanCursor}'), auto !important; }`;
      document.head.appendChild(style);
    }

    // =============================================================
    // 12. POPUP WINDOW (kept from earlier)
    // =============================================================
    function openSimpleWindow(url) {
      const features =
        'popup,' +
        'width=650,' +
        'height=800,' +
        'menubar=no,' +
        'toolbar=no,' +
        'location=no,' +
        'status=no,' +
        'scrollbars=yes,' +
        'resizable=yes';
      window.open(url, '_blank', features);
    }

    // =============================================================
    // 13. MAIN INIT – DOMContentLoaded
    // =============================================================
    document.addEventListener('DOMContentLoaded', async function () {
      // Get DOM references
      bdayInput = document.getElementById('user-birthday');
      sidebar = document.getElementById('meaning-sidebar');
      surface = document.getElementById('canvas-surface');
      dealBtn = document.getElementById('deal-spread-btn');
      clearBtn = document.getElementById('clear-btn');
      shuffleBtn = document.getElementById('shuffle-btn');
      dropdown = document.getElementById('spread-matrix');

      // Setup cloth/cursor immediately
      setupClothAndCursor();

      // Load tarot data
      await loadTarotData();
      // Preload images (runs after tarot loaded)
      preloadImages();

      // Shuffle decks
      shuffleTarot();
      shuffleRunes();

      // Initial UI generation
      generateMatrixSlots();
      updateProfiles();
      resetSidebar();

      // Event listeners
      dealBtn.addEventListener('click', dealSpread);

      clearBtn.addEventListener('click', () => {
        generateMatrixSlots();
        shuffleRunes();
        shuffleTarot();
      });

      shuffleBtn.addEventListener('click', () => {
        shuffleTarot();
        shuffleRunes();
        sidebar.innerHTML = `<p class="meaning-text" style="color: #c77dff;">🔮 Decks have been reshuffled.</p>`;
        setTimeout(resetSidebar, 2000);
      });

      dropdown.addEventListener('change', generateMatrixSlots);

      bdayInput.addEventListener('change', updateProfiles);
      // --- Save user data to localStorage ---
      const nameInput = document.getElementById('user-name');

      function saveUserData() {
        localStorage.setItem('user-name', nameInput.value);
        localStorage.setItem('user-birthday', bdayInput.value);
      }

      nameInput.addEventListener('change', saveUserData);
      bdayInput.addEventListener('change', saveUserData);
      saveUserData(); // initial save
      // Hover badges → sidebar
      [document.getElementById('zodiac-box'), document.getElementById('stone-box')].forEach(box => {
        if (!box) return;
        box.addEventListener('mouseenter', () => {
          const info = box.getAttribute('data-info');
          if (info) {
            sidebar.innerHTML = `
              <h4 class="meaning-title">Cosmic Alignment</h4>
              <p class="meaning-text" style="white-space: pre-line;">${info}</p>
            `;
          }
        });
        box.addEventListener('mouseleave', resetSidebar);
      });

      console.log('✅ Altar fully initialised.');
    });
  </script>
</body>
