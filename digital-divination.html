<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Main Altar — Digital Divination</title>
  <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon">
  <style>
    :root {
      --sidebar-bg: #14101e;
      --text-color: #e2daeb;
      --accent-color: #9d4edd;
      --accent-hover: #c77dff;
      --border-color: #3c2f5c;
      --meaning-bg: #1b162a;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      color: var(--text-color);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 320px;
      background-color: #0d0b14;
    }

    /* --- PROFILE COSMETIC INDICATORS --- */
    .profile-indicator {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid var(--border-color);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 15px;
      z-index: 10;
    }
    #zodiac-box { left: 15px; }
    #stone-box { right: 335px; }
    .profile-indicator img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    /* --- LEFT SIDE: THE ALTAR SURFACE --- */
    .altar-table {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: auto;
      padding: 100px 20px 20px 20px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fixed Aspect Ratio Altar Matrix Canvas to prevent wrapping breakages */
    .spread-grid-canvas {
      position: relative;
      width: 100%;
      max-width: 950px;
      height: 75vh;
      max-height: 600px;
      margin: auto;
      display: grid;
      gap: 15px;
      box-sizing: border-box;
    }

    /* Grid Layout Formats based on active selection */
    .layout-single {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }
    .layout-past-present-future {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr;
    }
    .layout-tree-of-life {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }
    .layout-celtic-cross {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }

    /* Target Slot Placeholders */
    .spread-slot {
      border: 2px dashed rgba(157, 78, 221, 0.25);
      border-radius: 8px;
      background: rgba(13, 11, 20, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 8px;
      box-sizing: border-box;
      position: relative;
      text-align: center;
    }

    .slot-label {
      font-size: 0.75rem;
      color: #b0a4c4;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      z-index: 2;
      background: rgba(13, 11, 20, 0.8);
      padding: 2px 6px;
      border-radius: 4px;
      width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Card Layout Dimensions & Flips */
/* Target Slot Placeholders */
    .spread-slot {
      border: 2px dashed rgba(157, 78, 221, 0.25);
      border-radius: 8px;
      background: rgba(13, 11, 20, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 6px;
      box-sizing: border-box;
      position: relative;
      text-align: center;
      overflow: hidden; /* Keeps things neat */
    }

    /* Card Layout Dimensions & Flips */
    .tarot-card-wrapper {
      position: relative; /* Changed from absolute to prevent horizontal layout stretching */
      width: auto;
      height: calc(100% - 28px); /* Dynamically leaves exact breathing room for the text label below */
      aspect-ratio: 13 / 22; /* Force-locks perfect, traditional vertical tarot card proportions */
      max-width: 100%;
      perspective: 1000px;
      z-index: 5;
      margin: auto auto 4px auto; /* Centers the card perfectly within the grid cell slot space */
    }

    .tarot-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 6px 12px rgba(0,0,0,0.6);
      border-radius: 6px;
    }

    .tarot-card-inner.flipped { transform: rotateY(180deg); }
    .tarot-card-inner.inverted .card-front img { transform: rotateY(180deg) rotate(180deg); }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      background-color: #0d0b14;
    }

    .card-back img, .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-front { transform: rotateY(180deg); }

    /* --- RIGHT SIDE: CONTROLS SIDEBAR --- */
    .controls-sidebar {
      background-color: var(--sidebar-bg);
      border-left: 2px solid var(--border-color);
      padding: 20px 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      z-index: 20;
    }

    .sidebar-section { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-hover); }
    input, select { background-color: #09070e; border: 1px solid var(--border-color); color: var(--text-color); padding: 8px; border-radius: 4px; font-family: inherit; }
    button { background-color: var(--accent-color); color: #fff; border: none; padding: 12px; font-size: 0.95rem; font-family: inherit; border-radius: 4px; cursor: pointer; }
    button:hover { background-color: var(--accent-hover); }
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .secondary-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
    .secondary-btn:hover { background: rgba(157, 78, 221, 0.15); border-color: var(--accent-hover); }

    .meaning-panel {
      background-color: var(--meaning-bg);
      border: 1px dashed var(--border-color);
      border-radius: 6px;
      padding: 12px;
      min-height: 150px;
    }
    .meaning-title { font-size: 1.1rem; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; margin: 0 0 5px 0; }
    .meaning-orientation { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; }
    .orientation-upright { color: #4ade80; }
    .orientation-reversed { color: #f87171; }
    .meaning-text { font-size: 0.85rem; line-height: 1.4; color: #cbd5e1; margin: 5px 0 0 0; }
  </style>
</head>
<body>

  <div class="profile-indicator" id="zodiac-box"></div>
  <div class="profile-indicator" id="stone-box"></div>

  <div class="altar-table" id="altar-table">
    <div class="spread-grid-canvas" id="canvas-surface"></div>
  </div>

  <div class="controls-sidebar">
    <h3 style="margin:0; text-align:center; color: var(--accent-hover); border-bottom:1px solid var(--border-color); padding-bottom:10px;">— Controls —</h3>
    
    <div class="sidebar-section">
      <label for="user-name">Target Name</label>
      <input type="text" id="user-name" value="Emmery">
    </div>

    <div class="sidebar-section">
      <label for="user-birthday">Birthday</label>
      <input type="date" id="user-birthday" value="1973-07-20">
    </div>

    <div class="sidebar-section">
      <label for="spread-matrix">Spread Layout</label>
      <select id="spread-matrix">
        <option value="single">Daily Influence (1 Card)</option>
        <option value="past-present-future">Past, Present, Future</option>
        <option value="tree-of-life">Tree of Life</option>
        <option value="celtic-cross">Celtic Cross</option>
      </select>
    </div>

    <button id="deal-spread-btn">Cast Selected Spread</button>
    
    <div class="action-grid">
      <button id="clear-btn" class="secondary-btn">Clear Table</button>
      <button id="shuffle-btn" class="secondary-btn">Shuffle Deck</button>
    </div>

    <div class="sidebar-section">
      <label>Grimoire Focus</label>
      <div class="meaning-panel" id="meaning-sidebar"></div>
    </div>

    <div class="sidebar-section" style="margin-top:auto; gap:8px;">
      <button onclick="window.location.href='settings.html'" class="secondary-btn" style="padding:6px; font-size:0.8rem;">Configure Table</button>
      <button onclick="window.location.href='index.html'" class="secondary-btn" style="padding:6px; font-size:0.8rem;">Exit Altar</button>
    </div>
  </div>

  <script>
   // ==========================================
    // 1. MASTER DIVINATION DATABASE INTEGRATION
    // ==========================================
    const DivinationDatabase = {
      tarot: {
        "the-fool": { name: "The Fool", upright: "New beginnings, potential, spontaneous action, faith in the universe, innocence.", reversed: "Recklessness, risk-taking, consideration delays, naivety, holding back." },
        "the-magician": { name: "The Magician", upright: "Manifestation, willpower, desire, resourcefulness, skill mastery.", reversed: "Manipulation, illusions, wasted latent talent, misdirected intentions." },
        "the-high-priestess": { name: "The High Priestess", upright: "Intuition, sacred knowledge, divine feminine, subconscious insights.", reversed: "Secret motives, ignoring inner guidance, surface-level focus." },
        "the-empress": { name: "The Empress", upright: "Abundance, creativity, nature, fertility, domestic comfort.", reversed: "Creative blocks, dependence on others, smothering behavior." },
        "the-emperor": { name: "The Emperor", upright: "Authority, structure, solid foundation, protection, logical rule.", reversed: "Tyranny, rigidity, loss of control, overbearing boundaries." },
        "the-hierophant": { name: "The Hierophant", upright: "Tradition, spiritual wisdom, orthodoxy, institutional alignment.", reversed: "Rebellion, unorthodox paths, breaking conventions, rigid dogma." },
        "the-lovers": { name: "The Lovers", upright: "Harmony, relationships, deep choices, core values alignment.", reversed: "Disharmony, misalignment of values, avoidance of tough choices." },
        "the-chariot": { name: "The Chariot", upright: "Direction, control, victory, overcoming obstacles through sheer will.", reversed: "Lack of direction, running out of control, internal aggression blocks." },
        "strength": { name: "Strength", upright: "Fortitude, inner courage, quiet endurance, compassion, influence.", reversed: "Self-doubt, raw emotion outbursts, weakness, inadequacy." },
        "the-hermit": { name: "The Hermit", upright: "Soul-searching, inner reflection, spiritual mentorship, isolation.", reversed: "Loneliness, withdrawal baggage, pariah behavior, rejecting wisdom." },
        "the-wheel-of-fortune": { name: "The Wheel of Fortune", upright: "Good luck, destiny cycles, turning points, unseen synchronized forces.", reversed: "Bad luck, breaking cyclic habits, resisting change, external friction." },
        "justice": { name: "Justice", upright: "Fairness, cosmic truth, causal accountability, systemic balance.", reversed: "Unfairness, lack of accountability, dishonesty, legal complications." },
        "the-hanged-man": { name: "The Hanged Man", upright: "Sacrifice, new perspectives, pausing time, enlightened surrender.", reversed: "Stagnation, martyr complexes, useless delays, wasting dynamic time." },
        "death": { name: "Death", upright: "Metamorphosis, absolute closure, purging dead roots, natural evolution.", reversed: "Resisting change, stagnant loops, clinging to dead weight." },
        "temperance": { name: "Temperance", upright: "Alchemy, patience, middle path moderation, harmonious blending.", reversed: "Imbalance, excess, conflicting goals, chaotic combinations." },
        "the-devil": { name: "The Devil", upright: "Shadow self, material attachments, addiction, illusion of restriction.", reversed: "Detachment, breaking structural chains, shadow work confrontation." },
        "the-tower": { name: "The Tower", upright: "Sudden upheaval, broken foundations, revelation, unexpected truth sparks.", reversed: "Avoiding critical disasters, delayed cleanup, fear of structural change." },
        "the-star": { name: "The Star", upright: "Hope, serenity, spiritual rejuvenation, cosmic guidance, healing.", reversed: "Despair, lost faith, dynamic creative blockages, discouragement." },
        "the-moon": { name: "The Moon", upright: "Illusion, deep anxiety, hidden cyclical mechanics, vivid dreams.", reversed: "Release of deep fears, clarity dawning, unmasking structural illusions." },
        "the-sun": { name: "The Sun", upright: "Radiant success, vitality, pure joy, truth illuminated, confidence.", reversed: "Temporary clouds, ego blocks, minor vitality depletion." },
        "judgement": { name: "Judgement", upright: "Absolution, deep calling, self-evaluation, significant choices.", reversed: "Self-doubt, inner critic noise, ignoring a major calling." },
        "the-world": { name: "The World", upright: "Fulfillment, cycle completion, integration, absolute achievement.", reversed: "Shortcuts, incomplete cycles, seeking closure elsewhere." }
      },
      zodiac: {
        "aries": { name: "Aries", element: "Fire", traits: "Initiating, bold, courageous, competitive, protective." },
        "taurus": { name: "Taurus", element: "Earth", traits: "Grounding, deliberate, artistic, loyal, persistent." },
        "gemini": { name: "Gemini", element: "Air", traits: "Intellectual, adaptive, witty, dualistic nature, curious." },
        "cancer": { name: "Cancer", element: "Water", traits: "Nurturing, intuitive, protective sanctuary builders, deep emotion." },
        "leo": { name: "Leo", element: "Fire", traits: "Radiant, expressive, proud, protective, deeply creative." },
        "virgo": { name: "Virgo", element: "Earth", traits: "Analytical, methodical, dedicated craftspeople, health-focused." },
        "libra": { name: "Libra", element: "Air", traits: "Harmonious, tactical peacemakers, justice-oriented, social." },
        "scorpio": { name: "Scorpio", element: "Water", traits: "Transformative, investigative, intense, master of alchemy." },
        "sagittarius": { name: "Sagittarius", element: "Fire", traits: "Philosophical, freedom-seeking, expansive visionaries." },
        "capricorn": { name: "Capricorn", element: "Earth", traits: "Disciplined, systematic architectural builders, patient status focus." },
        "aquarius": { name: "Aquarius", element: "Air", traits: "Innovative, independent global networkers, unconventional visionaries." },
        "pisces": { name: "Pisces", element: "Water", traits: "Mystical, deeply artistic, empathetic dreamers, fluid anchors." }
      },
      birthstones: {
        1:  { month: "January",   modern: "Garnet",     mystical: "Emerald", properties: "Constancy, dynamic structural grounding, vital protection." },
        2:  { month: "February",  modern: "Amethyst",   mystical: "Bloodstone", properties: "Absolute clarity, clearing emotional loops, spiritual temperance." },
        3:  { month: "March",     modern: "Aquamarine", mystical: "Jade", properties: "Fluid communication lines, pure clear vision, courage." },
        4:  { month: "April",     modern: "Diamond",    mystical: "Opal", properties: "Indestructible intent, amplifying divine light frequencies." },
        5:  { month: "May",       modern: "Emerald",    mystical: "Sapphire", properties: "Abundant growth, heart center alignment, clear foresight." },
        6:  { month: "June",      modern: "Pearl",      mystical: "Agate", properties: "Pure transformation integration, cyclical lunar sync." },
        7:  { month: "July",      modern: "Ruby",       mystical: "Ruby", properties: "Primal fire passion, deep sovereign leadership, life force power." },
        8:  { month: "August",    modern: "Peridot",    mystical: "Diamond", properties: "Shielding clearing grids, joyous heart expression, manifestation." },
        9:  { month: "September", modern: "Sapphire",   mystical: "Chrysolite", properties: "Higher mental focus, structural cosmic order, absolute truth." },
        10: { month: "October",   modern: "Opal",       mystical: "Aquamarine", properties: "Astral dream amplification, dynamic multidimensional vision." },
        11: { month: "November",  modern: "Topaz",      mystical: "Pearl", properties: "Sovereign personal power focus, warmth, continuous abundance." },
        12: { month: "December",  modern: "Turquoise",  mystical: "Ruby", properties: "Master communication channels, global astral protection, deep peace." }
      }
    };

    // ==========================================
    // 2. THE ALTAR PATH FIXES & AMBIANCE ---
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => {
      const savedCloth = localStorage.getItem('selectedCloth') || 'assets/cloths/cloth-1.jpg';
      const cleanClothPath = savedCloth.startsWith('assets') ? savedCloth : savedCloth.substring(savedCloth.indexOf('assets'));
      
      const savedCursor = localStorage.getItem('selectedCursor') || 'assets/cursors/cursor-1.cur';
      const cleanCursorPath = savedCursor.startsWith('assets') ? savedCursor : savedCursor.substring(savedCursor.indexOf('assets'));

      document.body.style.background = `linear-gradient(rgba(13, 11, 20, 0.88), rgba(13, 11, 20, 0.88)), url('${cleanClothPath}')`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      
      const globalStyle = document.createElement('style');
      globalStyle.innerHTML = `* { cursor: url('${cleanCursorPath}'), auto !important; }`;
      document.head.appendChild(globalStyle);
      
      updateProfiles();
      generateMatrixSlots();
    });

    // ==========================================
    // 3. SPREAD MATRIX GEOMETRY SYSTEM
    // ==========================================
    const spreadLayouts = {
      "single": { class: "layout-single", labels: ["Daily Influence"] },
      "past-present-future": { class: "layout-past-present-future", labels: ["Past / Foundation", "Present / Challenge", "Future / Outcome"] },
      "tree-of-life": { class: "layout-tree-of-life", labels: ["1. Kether (Crown)", "2. Chokmah (Wisdom)", "3. Binah (Understanding)", "4. Chesed (Mercy)", "5. Geburah (Severity)", "6. Tiphereth (Beauty)", "7. Netzach (Victory)", "8. Hod (Glory)", "9. Yesod (Foundation)", "10. Malkuth (Kingdom)"] },
      "celtic-cross": { class: "layout-celtic-cross", labels: ["1. Present Focus", "2. Challenge", "3. Subconscious", "4. Recent Past", "5. Goals", "6. Near Future", "7. Advice", "8. Environment", "9. Hopes/Fears", "10. Outcome"] }
    };

    // Full 78 Engine Builder
    const suits = ['cups', 'pentacles', 'swords', 'wands'];
    const ranks = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'ace', 'king', 'knight', 'page', 'queen'];
    const majors = ['death', 'judgement', 'justice', 'strength', 'temperance', 'the-chariot', 'the-devil', 'the-emperor', 'the-empress', 'the-fool', 'the-hanged-man', 'the-hermit', 'the-hierophant', 'the-high-priestess', 'the-lovers', 'the-magician', 'the-moon', 'the-star', 'the-sun', 'the-tower', 'the-wheel-of-fortune', 'the-world'];

    const tarotDeck = [];
    majors.forEach(m => tarotDeck.push({ key: m, file: `${m}.jpg` }));
    suits.forEach(s => {
      ranks.forEach(r => {
        tarotDeck.push({ key: `${r}-of-${s}`, file: `${r}-of-${s}.jpg` });
      });
    });

    let runtimeDeck = [...tarotDeck];
    function shuffle() {
      for (let i = runtimeDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [runtimeDeck[i], runtimeDeck[j]] = [runtimeDeck[j], runtimeDeck[i]];
      }
    }
    shuffle();

    // ==========================================
    // 4. PROFILE AUTOMATION ENGINE
    // ==========================================
    const bdayInput = document.getElementById('user-birthday');
    bdayInput.addEventListener('change', updateProfiles);

    function updateProfiles() {
      if (!bdayInput.value) return;
      const date = new Date(bdayInput.value + 'T00:00:00');
      const month = date.getMonth() + 1;
      const day = date.getDate();

      // Birthstone Rendering + Tooltip Data
      const stones = ['garnet2.gif','amethyst2.gif','aquamarine2.gif','diamond2.gif','emerald2.gif','pearl1.gif','ruby2.gif','peridot2.gif','saphire2.gif','opal2.gif','topaz2.gif','turquoise.gif'];
      const stoneData = DivinationDatabase.birthstones[month];
      
      const stoneBox = document.getElementById('stone-box');
      stoneBox.innerHTML = `<img src="assets/birthstones/${stones[month - 1]}">`;
      stoneBox.setAttribute('data-info', `Month: ${stoneData.month} | Modern: ${stoneData.modern} | Mystical: ${stoneData.mystical} \nProperties: ${stoneData.properties}`);

      // Zodiac Configurations
      let signKey = "capricorn";
      let signImg = "capricorn.jpg";
      
      if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) { signKey = "aquarius"; signImg = "aquarius.jpg"; }
      else if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) { signKey = "pisces"; signImg = "pisces.jpg"; }
      else if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) { signKey = "aries"; signImg = "aries.jpg"; }
      else if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) { signKey = "taurus"; signImg = "taurus.jpg"; }
      else if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) { signKey = "gemini"; signImg = "gemini.jpg"; }
      else if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) { signKey = "cancer"; signImg = "cancer.jpg"; }
      else if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) { signKey = "leo"; signImg = "leo.jpg"; }
      else if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) { signKey = "virgo"; signImg = "virgo.jpg"; }
      else if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) { signKey = "libra"; signImg = "libra.jpg"; }
      else if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) { signKey = "scorpio"; signImg = "scorpio.jpg"; }
      else if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) { signKey = "sagittarius"; signImg = "sagittarius.jpg"; }
      
      const zodiacData = DivinationDatabase.zodiac[signKey];
      const zodiacBox = document.getElementById('zodiac-box');
      zodiacBox.innerHTML = `<img src="assets/signs/${signImg}">`;
      zodiacBox.setAttribute('data-info', `${zodiacData.name} (${zodiacData.element})\nTraits: ${zodiacData.traits}`);
    }

    // Interactive Hover Listeners for Badges
    [document.getElementById('zodiac-box'), document.getElementById('stone-box')].forEach(box => {
      box.addEventListener('mouseenter', () => {
        const info = box.getAttribute('data-info');
        document.getElementById('meaning-sidebar').innerHTML = `
          <h4 class="meaning-title">Cosmic Alignment</h4>
          <p class="meaning-text" style="white-space: pre-line;">${info}</p>
        `;
      });
      box.addEventListener('mouseleave', resetSidebar);
    });

    // ==========================================
    // 5. INTERACTIVE SURFACE LOGIC
    // ==========================================
    const dropdown = document.getElementById('spread-matrix');
    const surface = document.getElementById('canvas-surface');
    const sidebar = document.getElementById('meaning-sidebar');

    dropdown.addEventListener('change', generateMatrixSlots);

    function generateMatrixSlots() {
      surface.innerHTML = '';
      resetSidebar();
      
      const layoutData = spreadLayouts[dropdown.value];
      surface.className = `spread-grid-canvas ${layoutData.class}`;

      layoutData.labels.forEach((labelText, index) => {
        const slot = document.createElement('div');
        slot.className = 'spread-slot';
        slot.innerHTML = `<div class="slot-label">${labelText}</div>`;
        surface.appendChild(slot);
      });
    }

    function resetSidebar() {
      sidebar.innerHTML = `<p class="meaning-text" style="font-style: italic; color: #a092b8; text-align: center;">Hover your ritual pointer over a face-up card or cosmic badge to look up meanings.</p>`;
    }

    document.getElementById('deal-spread-btn').addEventListener('click', () => {
      const slots = document.querySelectorAll('.spread-slot');
      slots.forEach((slot, idx) => {
        if (slot.querySelector('.tarot-card-wrapper')) return;

        if (runtimeDeck.length === 0) {
          runtimeDeck = [...tarotDeck];
          shuffle();
        }

        const cardData = runtimeDeck.pop();
        const wrapper = document.createElement('div');
        wrapper.className = 'tarot-card-wrapper';
        const isInverted = Math.random() >= 0.5;

        wrapper.setAttribute('data-key', cardData.key);
        wrapper.setAttribute('data-inverted', isInverted);
        wrapper.setAttribute('data-position', slot.querySelector('.slot-label').innerText);

        wrapper.innerHTML = `
          <div class="tarot-card-inner">
            <div class="card-back"><img src="assets/misc/back.jpg"></div>
            <div class="card-front"><img src="assets/tarot-cards/${cardData.file}"></div>
          </div>
        `;

        wrapper.addEventListener('mouseenter', () => {
          const key = wrapper.getAttribute('data-key');
          const inverted = wrapper.getAttribute('data-inverted') === 'true';
          const pos = wrapper.getAttribute('data-position');
          
          // Fallback handling to ensure unmapped minor arcana still gracefully render
          const info = DivinationDatabase.tarot[key] || { 
            name: key.replace(/-/g, ' '), 
            upright: "Esoteric definitions are flowing. Core card mechanics are online.", 
            reversed: "Inverted alignment shifting interpretations. Core mechanics are online." 
          };
          
          sidebar.innerHTML = `
            <h4 class="meaning-title" style="text-transform: capitalize;">${info.name}</h4>
            <div style="font-size: 0.75rem; color:#a092b8;">Location: ${pos}</div>
            <div class="meaning-orientation ${inverted ? 'orientation-reversed' : 'orientation-upright'}">
              ${inverted ? 'Reversed' : 'Upright'}
            </div>
            <p class="meaning-text">${inverted ? info.reversed : info.upright}</p>
          `;
        });
        wrapper.addEventListener('mouseleave', resetSidebar);

        slot.appendChild(wrapper);
        setTimeout(() => {
          const inner = wrapper.querySelector('.tarot-card-inner');
          if(isInverted) inner.classList.add('inverted');
          inner.classList.add('flipped');
        }, idx * 200 + 100);
      });
    });

    document.getElementById('clear-btn').addEventListener('click', generateMatrixSlots);
    document.getElementById('shuffle-btn').addEventListener('click', () => {
      runtimeDeck = [...tarotDeck];
      shuffle();
      resetSidebar();
      alert("Deck shuffler reset complete.");
    });
  </script>
</body>
</html>
