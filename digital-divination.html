<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Main Altar — Digital Divination</title>
  <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon">
  <style>
    :root {
      --sidebar-bg: #14101e;
      --panel-bg: rgba(9, 7, 14, 0.85);
      --text-color: #e2daeb;
      --accent-color: #9d4edd;
      --accent-hover: #c77dff;
      --border-color: #3c2f5c;
      --meaning-bg: #1b162a;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      color: var(--text-color);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 320px; /* Expanded sidebar slightly for comfortable reading */
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* --- PROFILE COSMETIC INDICATORS --- */
    .profile-indicator {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 15px;
      z-index: 10;
    }
    #zodiac-box { left: 15px; }
    #stone-box { right: 335px; }
    .profile-indicator img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    /* --- LEFT SIDE: THE ALTAR SURFACE --- */
    .altar-table {
      position: relative;
      height: 100vh;
      overflow-y: auto;
      padding: 100px 30px 30px 30px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .spread-grid-canvas {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1100px;
    }

    /* Target Slot Placeholders */
    .spread-slot {
      width: 150px;
      min-height: 250px;
      border: 2px dashed rgba(157, 78, 221, 0.3);
      border-radius: 8px;
      background: rgba(13, 11, 20, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-sizing: border-box;
      position: relative;
      text-align: center;
    }

    .slot-label {
      font-size: 0.85rem;
      color: #b0a4c4;
      margin-top: 10px;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
    }

    /* Card Layout Dimensions & Flips */
    .tarot-card-wrapper {
      width: 130px;
      height: 220px;
      perspective: 1000px;
      position: absolute;
      top: 10px;
      z-index: 5;
    }

    .tarot-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 8px 16px rgba(0,0,0,0.6);
      border-radius: 6px;
      pointer-events: none; /* Let events bubble to wrapper */
    }

    .tarot-card-inner.flipped { transform: rotateY(180deg); }
    
    .tarot-card-inner.inverted .card-front img {
      transform: rotateY(180deg) rotate(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      background-color: #0d0b14;
    }

    .card-back img, .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-front { transform: rotateY(180deg); }

    /* --- RIGHT SIDE: CONTROLS & MEANING SIDEBAR --- */
    .controls-sidebar {
      background-color: var(--sidebar-bg);
      border-left: 2px solid var(--border-color);
      padding: 20px 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      box-shadow: -5px 0 25px rgba(0,0,0,0.5);
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-hover);
    }

    input, select {
      background-color: #09070e;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.95rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    button {
      background-color: var(--accent-color);
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 1rem;
      font-family: inherit;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background-color: var(--accent-hover); }
    
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
    }
    .secondary-btn:hover {
      background: rgba(157, 78, 221, 0.15);
      border-color: var(--accent-hover);
    }

    /* DYNAMIC MEANING INTERPRETATION PANEL */
    .meaning-panel {
      background-color: var(--meaning-bg);
      border: 1px dashed var(--border-color);
      border-radius: 6px;
      padding: 15px;
      margin-top: 10px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .meaning-title {
      font-size: 1.15rem;
      color: #fff;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 4px;
      margin: 0;
    }

    .meaning-orientation {
      font-size: 0.8rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .orientation-upright { color: #4ade80; }
    .orientation-reversed { color: #f87171; }

    .meaning-text {
      font-size: 0.9rem;
      line-height: 1.4;
      color: #cbd5e1;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="profile-indicator" id="zodiac-box"></div>
  <div class="profile-indicator" id="stone-box"></div>

  <!-- Left Altar Table Space -->
  <div class="altar-table" id="altar-table">
    <div class="spread-grid-canvas" id="canvas-surface"></div>
  </div>

  <!-- Right Sidebar Controls -->
  <div class="controls-sidebar">
    <h3 style="margin:0; text-align:center; color: var(--accent-hover); border-bottom:1px solid var(--border-color); padding-bottom:10px;">— Controls —</h3>
    
    <div class="sidebar-section">
      <label for="user-name">Target Name</label>
      <input type="text" id="user-name" placeholder="Emmery">
    </div>

    <div class="sidebar-section">
      <label for="user-birthday">Birthday</label>
      <input type="date" id="user-birthday">
    </div>

    <div class="sidebar-section">
      <label for="spread-matrix">Spread Layout</label>
      <select id="spread-matrix">
        <option value="single">Daily Influence (1 Card)</option>
        <option value="past-present-future">Past, Present, Future</option>
        <option value="celtic-cross">Celtic Cross</option>
        <option value="astrological">Astrological Spread</option>
        <option value="relationship">Relationship Layout</option>
        <option value="planetary">Planetary Alignment</option>
        <option value="birthday-spread">Birthday Mandala</option>
        <option value="star">The Star Spread</option>
        <option value="tree-of-life">Tree of Life</option>
        <option value="cross-triangle">Cross and Triangle</option>
        <option value="past-life">Past Life Regression</option>
      </select>
    </div>

    <button id="deal-spread-btn">Cast Selected Spread</button>
    
    <div class="action-grid">
      <button id="clear-btn" class="secondary-btn">Clear Table</button>
      <button id="shuffle-btn" class="secondary-btn">Shuffle Deck</button>
    </div>

    <!-- REPLICATING EXECUTABLE MEANING CONTAINER -->
    <div class="sidebar-section">
      <label>Grimoire Focus</label>
      <div class="meaning-panel" id="meaning-sidebar">
        <p class="meaning-text" style="font-style: italic; color: #a092b8; text-align: center; margin-top: auto; margin-bottom: auto;">
          Hover your ritual tool over a face-up card on the altar to pull forth its hidden meanings and positions.
        </p>
      </div>
    </div>

    <div class="sidebar-section" style="margin-top:auto; gap:10px;">
      <button onclick="window.location.href='settings.html'" class="secondary-btn" style="padding:8px; font-size:0.85rem;">Configure Table</button>
      <button onclick="window.location.href='index.html'" class="secondary-btn" style="padding:8px; font-size:0.85rem;">Exit Altar</button>
    </div>
  </div>

  <script>
    // --- 1. THE ALTAR AMBIANCE SYNC ---
    window.addEventListener('DOMContentLoaded', () => {
      const customCloth = localStorage.getItem('selectedCloth') || 'assets/cloths/cloth-1.jpg';
      const customCursor = localStorage.getItem('selectedCursor') || 'assets/cursors/cursor-1.cur';

      document.body.style.background = `linear-gradient(rgba(13, 11, 20, 0.85), rgba(13, 11, 20, 0.85)), url('${customCloth}')`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundRepeat = 'no-repeat';
      
      const globalStyle = document.createElement('style');
      globalStyle.innerHTML = `* { cursor: url('${customCursor}'), auto !important; }`;
      document.head.appendChild(globalStyle);
      
      generateMatrixSlots();
    });

    // --- 2. SPREAD CONFIGURATION ---
    const spreadLayouts = {
      "single": ["Daily Influence"],
      "past-present-future": ["Past / Foundation", "Present / Challenge", "Future / Outcome"],
      "celtic-cross": ["1. Present Focus", "2. Immediate Challenge", "3. Root Core", "4. Recent Past", "5. Potential Peak", "6. Immediate Future", "7. Internal State", "8. Environment", "9. Hopes & Fears", "10. Final Resolution"],
      "astrological": ["House I: Self", "House II: Value", "House III: Mind", "House IV: Home", "House V: Creation", "House VI: Health", "House VII: Unions", "House VIII: Mystery", "House IX: Philosophy", "House X: Status", "House XI: Networks", "House XII: Unconscious"],
      "relationship": ["Your State", "The Dynamic", "Their State", "Hidden Factors", "The Path Forward"],
      "planetary": ["Sun (Core)", "Moon (Emotion)", "Mercury (Mind)", "Venus (Affection)", "Mars (Drive)", "Jupiter (Expansion)", "Saturn (Lessons)"],
      "birthday-spread": ["Passed Year", "Current Lesson", "Emerging Self", "Gift of the Year", "The Horizon"],
      "star": ["Central Focus", "Point 1: Light", "Point 2: Shadow", "Point 3: Cosmic Advice", "Point 4: Grounding", "Point 5: Direct Path"],
      "tree-of-life": ["Kether", "Chokmah", "Binah", "Chesed", "Geburah", "Tiphereth", "Netzach", "Hod", "Yesod", "Malkuth"],
      "cross-triangle": ["Base Left", "Base Center", "Base Right", "Cross Center", "Apex Peak"],
      "past-life": ["Ancient Ancestry", "Karmic Debt", "Unresolved Lesson", "Current Advantage"]
    };

    // --- 3. EXPANDABLE COMPREHENSIVE INTERPRETATION DICTIONARY ---
    // You can deeply build out every single card's dictionary object below to hold all historical data points!
    const cardDatabase = {
      "the-fool.jpg": {
        name: "The Fool",
        upright: "New paths, innocence, pure potential, spontaneous action, and casting hesitation aside.",
        reversed: "Recklessness, alignment issues, blind risks, holding back from a calling, or general naivety."
      },
      "the-magician.jpg": {
        name: "The Magician",
        upright: "Manifestation, willpower, resourcefulness, mastery of physical elements, and focused intent.",
        reversed: "Manipulations, illusions, wasted gifts, unapplied skills, or fragmented energy focus."
      },
      "the-high-priestess.jpg": {
        name: "The High Priestess",
        upright: "Intuition, secret lore, subconscious patterns, trusting internal alignment, and silent wisdom.",
        reversed: "Surface focus, ignoring the gut voice, hidden motives unmasking, or fear of mystery."
      },
      "death.jpg": {
        name: "Death",
        upright: "Metamorphosis, absolute closings, purging dead roots, and natural evolutionary transitions.",
        reversed: "Resisting change, stagnant loops, clinging to rot, or fearful delays of inevitable endings."
      },
      "ace-of-wands.jpg": {
        name: "Ace of Wands",
        upright: "Spark of creativity, intense inspiration, new willpower, primal passion, and bold breakthroughs.",
        reversed: "Delays, flame dying out, creative blockages, misdirected passion, or ungrounded goals."
      }
      // Add other card files as you recreate your dataset...
    };

    // --- 4. ENGINE CONTROLS & STATE ---
    const tarotDeck = [
      { name: "The Fool", file: "the-fool.jpg" }, { name: "The Magician", file: "the-magician.jpg" },
      { name: "The High Priestess", file: "the-high-priestess.jpg" }, { name: "Death", file: "death.jpg" },
      { name: "Ace of Wands", file: "ace-of-wands.jpg" }
      // This matches your main 78-card listing...
    ];

    // Fallback dictionary builder for unmapped items to keep runtime flawless
    tarotDeck.forEach(c => {
      if (!cardDatabase[c.file]) {
        cardDatabase[c.file] = {
          name: c.name,
          upright: "Upright esoteric definitions currently preserved in database archives.",
          reversed: "Inverted esoteric definitions currently preserved in database archives."
        };
      }
    });

    let runtimeDeck = [...tarotDeck];

    function shuffle() {
      for (let i = runtimeDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [runtimeDeck[i], runtimeDeck[j]] = [runtimeDeck[j], runtimeDeck[i]];
      }
    }
    shuffle();

    const dropdown = document.getElementById('spread-matrix');
    const surface = document.getElementById('canvas-surface');
    const sidebar = document.getElementById('meaning-sidebar');

    dropdown.addEventListener('change', generateMatrixSlots);

    function generateMatrixSlots() {
      surface.innerHTML = '';
      resetSidebar();
      const chosenSpread = dropdown.value;
      const positions = spreadLayouts[chosenSpread];

      positions.forEach((labelText, index) => {
        const slot = document.createElement('div');
        slot.className = 'spread-slot';
        slot.id = `slot-${index}`;
        slot.innerHTML = `<div class="slot-label">${labelText}</div>`;
        surface.appendChild(slot);
      });
    }

    function resetSidebar() {
      sidebar.innerHTML = `
        <p class="meaning-text" style="font-style: italic; color: #a092b8; text-align: center; margin-top: auto; margin-bottom: auto;">
          Hover your ritual tool over a face-up card on the altar to pull forth its hidden meanings and positions.
        </p>
      `;
    }

    // --- 5. INTERACTIVE DEALING & MOUSEOVER HOOKS ---
    document.getElementById('deal-spread-btn').addEventListener('click', () => {
      const slots = document.querySelectorAll('.spread-slot');
      
      slots.forEach((slot, idx) => {
        if (slot.querySelector('.tarot-card-wrapper')) return;

        if (runtimeDeck.length === 0) {
          runtimeDeck = [...tarotDeck];
          shuffle();
        }

        const cardData = runtimeDeck.pop();
        const wrapper = document.createElement('div');
        wrapper.className = 'tarot-card-wrapper';
        
        const isInverted = Math.random() >= 0.5;

        // Store active data metrics attributes cleanly onto the elements
        wrapper.setAttribute('data-file', cardData.file);
        wrapper.setAttribute('data-inverted', isInverted);
        wrapper.setAttribute('data-position', slot.querySelector('.slot-label').innerText);

        wrapper.innerHTML = `
          <div class="tarot-card-inner ${isInverted ? 'inverted' : ''}">
            <div class="card-back"><img src="assets/misc/back.jpg" alt="Back"></div>
            <div class="card-front"><img src="assets/tarot-cards/${cardData.file}" alt="${cardData.name}"></div>
          </div>
        `;

        // --- MOUSEOVER ACTION LISTENERS ---
        wrapper.addEventListener('mouseenter', () => {
          const file = wrapper.getAttribute('data-file');
          const inverted = wrapper.getAttribute('data-inverted') === 'true';
          const positionText = wrapper.getAttribute('data-position');
          
          const info = cardDatabase[file];
          
          sidebar.innerHTML = `
            <h4 class="meaning-title">${info.name}</h4>
            <div style="font-size: 0.8rem; color:#a092b8; margin: 2px 0;">Location: ${positionText}</div>
            <div class="meaning-orientation ${inverted ? 'orientation-reversed' : 'orientation-upright'}">
              ${inverted ? 'Reversed / Inverted 180°' : 'Upright Alignment'}
            </div>
            <p class="meaning-text">${inverted ? info.reversed : info.upright}</p>
          `;
        });

        wrapper.addEventListener('mouseleave', resetSidebar);

        slot.appendChild(wrapper);

        setTimeout(() => {
          wrapper.querySelector('.tarot-card-inner').classList.add('flipped');
        }, idx * 250 + 100);
      });
    });

    document.getElementById('clear-btn').addEventListener('click', generateMatrixSlots);

    document.getElementById('shuffle-btn').addEventListener('click', () => {
      runtimeDeck = [...tarotDeck];
      shuffle();
      alert("The deck has been ritually reset and shuffled.");
    });
  </script>
</body>
</html>
