<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Natal Chart — Digital Divination</title>
    <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon" />
    <style>
        /* ===== Reset & Body ===== */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            background-color: #0a0a12;
            color: #e2daeb;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== Nav Bar ===== */
        .nav-bar {
            width: 100%;
            padding: 12px 20px;
            background: rgba(10, 10, 18, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a1f3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-bar .title {
            font-size: 1.2rem;
            color: #c77dff;
        }
        .nav-bar .back-btn {
            color: #b0a4c4;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid #3c2f5c;
            border-radius: 50px;
            transition: all 0.25s;
            font-size: 0.9rem;
        }
        .nav-bar .back-btn:hover {
            background: #9d4edd;
            color: #fff;
            border-color: #c77dff;
        }

        /* ===== Container ===== */
        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
        }

        /* ===== Form Panel ===== */
        .form-panel {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            background: rgba(20, 16, 30, 0.6);
            border: 1px solid #2a1f3d;
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(4px);
            align-self: flex-start;
        }
        .form-panel h2 {
            margin-top: 0;
            color: #c77dff;
            font-weight: normal;
            border-bottom: 1px solid #2a1f3d;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a092b8;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            background: #09070e;
            border: 1px solid #2a1f3d;
            border-radius: 8px;
            color: #e2daeb;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #9d4edd;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .btn-generate {
            width: 100%;
            padding: 12px;
            background: #9d4edd;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-generate:hover {
            background: #c77dff;
        }
        .btn-generate:active {
            transform: scale(0.98);
        }

        /* ===== Chart Panel ===== */
        .chart-panel {
            flex: 2;
            min-width: 400px;
            max-width: 700px;
            background: rgba(20, 16, 30, 0.4);
            border: 1px solid #2a1f3d;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chart-panel h2 {
            margin-top: 0;
            color: #c77dff;
            font-weight: normal;
        }
        #chartCanvas {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: radial-gradient(circle at center, #12101e, #0a0a12);
        }
        .chart-placeholder {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: radial-gradient(circle at center, #12101e, #0a0a12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a3c5c;
            font-size: 1rem;
            text-align: center;
            border: 1px solid #2a1f3d;
        }

        /* ===== Interpretation Panel ===== */
        .interpretation {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            background: rgba(20, 16, 30, 0.6);
            border: 1px solid #2a1f3d;
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(4px);
            align-self: flex-start;
            max-height: 600px;
            overflow-y: auto;
        }
        .interpretation h3 {
            color: #c77dff;
            font-weight: normal;
            border-bottom: 1px solid #2a1f3d;
            padding-bottom: 8px;
            margin-top: 0;
        }
        .interpretation .planet-entry {
            padding: 6px 0;
            border-bottom: 1px solid rgba(42, 31, 61, 0.3);
            font-size: 0.85rem;
        }
        .interpretation .planet-entry .symbol {
            font-size: 1.2rem;
            margin-right: 6px;
        }
        .interpretation .planet-entry .highlight {
            color: #c77dff;
        }
        .interpretation .aspect-list {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2a1f3d;
        }
        .interpretation .aspect-item {
            font-size: 0.8rem;
            color: #cbd5e1;
            padding: 2px 0;
        }
        .interpretation .aspect-item .aspect-type {
            font-weight: bold;
            color: #c77dff;
        }
        .interpretation::-webkit-scrollbar {
            width: 2px;
        }
        .interpretation::-webkit-scrollbar-track {
            background: transparent;
        }
        .interpretation::-webkit-scrollbar-thumb {
            background: #9d4edd;
            border-radius: 10px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            .form-panel,
            .interpretation {
                max-width: 100%;
                width: 100%;
            }
            .chart-panel {
                min-width: unset;
                width: 100%;
            }
            .nav-bar .title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAV BAR ===== -->
    <div class="nav-bar">
        <span class="title">✦ Natal Chart</span>
        <div>
            <a href="astrology.html" class="back-btn">🌌 Astrology</a>
            <a href="digital-divination.html" class="back-btn">← Altar</a>
        </div>
    </div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="container">

        <!-- ===== FORM PANEL ===== -->
        <div class="form-panel">
            <h2>📅 Birth Data</h2>
            <form id="birthForm">
                <div class="form-group">
                    <label for="birthName">Name</label>
                    <input type="text" id="birthName" placeholder="Your name" />
                </div>
                <div class="form-group">
                    <label for="birthDate">Birth Date</label>
                    <input type="date" id="birthDate" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="birthHour">Hour</label>
                        <input type="number" id="birthHour" min="0" max="23" value="12" />
                    </div>
                    <div class="form-group">
                        <label for="birthMinute">Minute</label>
                        <input type="number" id="birthMinute" min="0" max="59" value="0" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="birthLocation">Location</label>
                    <input type="text" id="birthLocation" placeholder="City, Country" />
                </div>
                <button type="submit" class="btn-generate">🔮 Generate Chart</button>
            </form>

            <div style="margin-top:12px; font-size:0.7rem; color:#4a3c5c; text-align:center;">
                💾 Name &amp; date are pre‑filled from your Altar profile.
            </div>
        </div>

        <!-- ===== CHART PANEL ===== -->
        <div class="chart-panel">
            <h2>🌀 Birth Chart</h2>
            <canvas id="chartCanvas"></canvas>
            <div id="chartInfo" style="margin-top:12px; font-size:0.85rem; color:#a092b8; text-align:center;">
                Enter your birth details and click "Generate Chart"
            </div>
        </div>

        <!-- ===== INTERPRETATION PANEL ===== -->
        <div class="interpretation" id="interpretation">
            <h3>📖 Interpretation</h3>
            <div id="natal-interp">
                <div style="color:#4a3c5c; font-style:italic; text-align:center; padding:20px 0;">
                    A celestial map awaits your birth data.
                </div>
            </div>
        </div>

    </div>

    <!-- ============================================================ -->
    <!-- ======================== SCRIPT ============================= -->
    <!-- ============================================================ -->
    <script>
        // =============================================================
        // 1. ZODIAC & PLANET DATA
        // =============================================================
        const zodiacSigns = [
            { symbol: '♈', name: 'Aries', start: 0, element: 'Fire', ruler: 'Mars' },
            { symbol: '♉', name: 'Taurus', start: 30, element: 'Earth', ruler: 'Venus' },
            { symbol: '♊', name: 'Gemini', start: 60, element: 'Air', ruler: 'Mercury' },
            { symbol: '♋', name: 'Cancer', start: 90, element: 'Water', ruler: 'Moon' },
            { symbol: '♌', name: 'Leo', start: 120, element: 'Fire', ruler: 'Sun' },
            { symbol: '♍', name: 'Virgo', start: 150, element: 'Earth', ruler: 'Mercury' },
            { symbol: '♎', name: 'Libra', start: 180, element: 'Air', ruler: 'Venus' },
            { symbol: '♏', name: 'Scorpio', start: 210, element: 'Water', ruler: 'Pluto' },
            { symbol: '♐', name: 'Sagittarius', start: 240, element: 'Fire', ruler: 'Jupiter' },
            { symbol: '♑', name: 'Capricorn', start: 270, element: 'Earth', ruler: 'Saturn' },
            { symbol: '♒', name: 'Aquarius', start: 300, element: 'Air', ruler: 'Uranus' },
            { symbol: '♓', name: 'Pisces', start: 330, element: 'Water', ruler: 'Neptune' }
        ];

        function getZodiacSign(angleDeg) {
            const normalized = ((angleDeg % 360) + 360) % 360;
            for (let i = 0; i < zodiacSigns.length; i++) {
                const start = zodiacSigns[i].start;
                const end = start + 30;
                if (normalized >= start && normalized < end) {
                    return zodiacSigns[i];
                }
            }
            return zodiacSigns[0];
        }

        // =============================================================
        // 2. PLANETARY CALCULATION
        // =============================================================
        const planetSpeeds = {
            Sun: 0.9856,
            Moon: 13.176,
            Mercury: 1.383,
            Venus: 0.615,
            Mars: 0.524,
            Jupiter: 0.083,
            Saturn: 0.033
        };

        const planetDisplay = {
            Sun: { symbol: '☀️', name: 'Sun' },
            Moon: { symbol: '🌙', name: 'Moon' },
            Mercury: { symbol: '☿', name: 'Mercury' },
            Venus: { symbol: '♀', name: 'Venus' },
            Mars: { symbol: '♂', name: 'Mars' },
            Jupiter: { symbol: '♃', name: 'Jupiter' },
            Saturn: { symbol: '♄', name: 'Saturn' }
        };

        const refAngles = {
            Sun: 280.46,
            Moon: 215.67,
            Mercury: 245.12,
            Venus: 185.34,
            Mars: 120.78,
            Jupiter: 45.23,
            Saturn: 320.56
        };

        function getPlanetAngle(planet, daysSinceEpoch) {
            const baseAngle = refAngles[planet] || 0;
            const speed = planetSpeeds[planet] || 0;
            return (baseAngle + speed * daysSinceEpoch) % 360;
        }

        function daysSinceEpoch(date) {
            const epoch = new Date(Date.UTC(2000, 0, 1, 12, 0, 0));
            const diffMs = date.getTime() - epoch.getTime();
            return diffMs / (1000 * 60 * 60 * 24);
        }

        function calculatePlanets(birthDate) {
            const days = daysSinceEpoch(birthDate);
            const planets = {};
            Object.keys(planetSpeeds).forEach(key => {
                const angle = getPlanetAngle(key, days);
                const sign = getZodiacSign(angle);
                planets[key] = {
                    angle: angle,
                    sign: sign,
                    display: planetDisplay[key]
                };
            });
            return planets;
        }

        // =============================================================
        // 3. ASPECT CALCULATION
        // =============================================================
        function calculateAspects(planets, orb = 8) {
            const keys = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
            const aspects = [];
            const aspectTypes = [
                { name: 'conjunction', angle: 0, symbol: '☌', description: 'energies merge' },
                { name: 'sextile', angle: 60, symbol: '⚹', description: 'opportunity' },
                { name: 'square', angle: 90, symbol: '□', description: 'tension' },
                { name: 'trine', angle: 120, symbol: '△', description: 'harmony' },
                { name: 'opposition', angle: 180, symbol: '☍', description: 'polarity' }
            ];

            for (let i = 0; i < keys.length; i++) {
                for (let j = i + 1; j < keys.length; j++) {
                    const p1 = keys[i];
                    const p2 = keys[j];
                    const a1 = planets[p1].angle;
                    const a2 = planets[p2].angle;
                    let diff = ((a2 - a1) % 360 + 360) % 360;
                    if (diff > 180) diff = 360 - diff;

                    for (let at of aspectTypes) {
                        if (Math.abs(diff - at.angle) < orb) {
                            aspects.push({
                                planet1: p1,
                                planet2: p2,
                                aspect: at,
                                orb: Math.abs(diff - at.angle)
                            });
                            break;
                        }
                    }
                }
            }
            return aspects;
        }

        // =============================================================
        // 4. DRAW CHART
        // =============================================================
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const size = Math.min(rect.width - 40, 500);
            canvas.width = size;
            canvas.height = size;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawChart(planets, birthName, birthDate) {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const radius = Math.min(w, h) * 0.42;

            ctx.clearRect(0, 0, w, h);

            const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.4);
            bg.addColorStop(0, '#1a1a2e');
            bg.addColorStop(1, '#0a0a12');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.translate(cx, cy);

            // Outer ring
            ctx.strokeStyle = '#2a1f3d';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, 2 * Math.PI);
            ctx.stroke();

            // Zodiac ring
            zodiacSigns.forEach((sign, i) => {
                const startAngle = (sign.start - 90) * Math.PI / 180;
                const endAngle = (sign.start + 30 - 90) * Math.PI / 180;

                ctx.strokeStyle = '#3c2f5c';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.stroke();

                const midAngle = (startAngle + endAngle) / 2;
                const labelR = radius + 22;
                const x = labelR * Math.cos(midAngle);
                const y = labelR * Math.sin(midAngle);

                ctx.fillStyle = '#b0a4c4';
                ctx.font = '13px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${sign.symbol}`, x, y - 12);
                ctx.font = '8px Georgia';
                ctx.fillText(sign.name, x, y + 12);
            });

            // Inner circles
            ctx.strokeStyle = 'rgba(42, 31, 61, 0.3)';
            ctx.lineWidth = 0.5;
            [0.7, 0.4].forEach(ratio => {
                ctx.beginPath();
                ctx.arc(0, 0, radius * ratio, 0, 2 * Math.PI);
                ctx.stroke();
            });

            // Grid lines
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                ctx.strokeStyle = 'rgba(42, 31, 61, 0.2)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(radius * 0.95 * Math.cos(angle), radius * 0.95 * Math.sin(angle));
                ctx.stroke();
            }

            // Planets
            const planetKeys = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
            const planetRadius = radius * 0.75;

            planetKeys.forEach((key) => {
                const data = planets[key];
                if (!data) return;
                const angleRad = (data.angle - 90) * Math.PI / 180;
                const dist = planetRadius * (0.25 + (planetKeys.indexOf(key) / planetKeys.length) * 0.6);
                const x = dist * Math.cos(angleRad);
                const y = dist * Math.sin(angleRad);

                const glow = ctx.createRadialGradient(x, y, 0, x, y, 12);
                glow.addColorStop(0, '#c77dff30');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, 2 * Math.PI);
                ctx.fill();

                ctx.fillStyle = '#c77dff';
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.fill();

                ctx.fillStyle = '#e2daeb';
                ctx.font = '8px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                const label = planetDisplay[key]?.symbol || key;
                ctx.fillText(label, x, y - 8);

                ctx.fillStyle = '#a092b8';
                ctx.font = '7px Georgia';
                ctx.textBaseline = 'top';
                ctx.fillText(data.sign.symbol, x + 6, y + 4);
            });

            // Center label
            ctx.fillStyle = '#4ade80';
            ctx.font = '14px Georgia';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☉', 0, -10);
            ctx.fillStyle = '#a092b8';
            ctx.font = '8px Georgia';
            ctx.textBaseline = 'top';
            ctx.fillText(birthName || 'Birth Chart', 0, 8);

            ctx.restore();

            const infoEl = document.getElementById('chartInfo');
            const dateStr = birthDate ? new Date(birthDate).toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }) : 'Unknown date';
            infoEl.textContent = `${birthName || 'Your'} chart – ${dateStr}`;
        }

        // =============================================================
        // 5. INTERPRETATION + ASPECTS
        // =============================================================
        function generateInterpretation(planets, birthName, aspects) {
            const keys = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
            let html = '';

            keys.forEach(key => {
                const data = planets[key];
                if (!data) return;
                const display = planetDisplay[key];
                const sign = data.sign;

                const interpretations = {
                    Sun: `Your core identity and vitality. You express yourself through ${sign.name} energy.`,
                    Moon: `Your emotional nature and inner world. You feel most at home with ${sign.name} qualities.`,
                    Mercury: `Your communication style and thinking. You process information through ${sign.name} intuition.`,
                    Venus: `Your love language and values. You attract and appreciate ${sign.name} energy.`,
                    Mars: `Your drive and ambition. You pursue goals with ${sign.name} determination.`,
                    Jupiter: `Your growth and expansion. You find meaning through ${sign.name} wisdom.`,
                    Saturn: `Your discipline and structure. You build foundations with ${sign.name} integrity.`
                };

                html += `
                    <div class="planet-entry">
                        <span class="symbol">${display.symbol}</span>
                        <strong>${display.name}</strong> in <span class="highlight">${sign.symbol} ${sign.name}</span>
                        <br />
                        <span style="font-size:0.75rem; color:#94a3b8;">${interpretations[key] || 'A unique expression of this placement.'}</span>
                    </div>
                `;
            });

            // ---- ASPECTS SECTION ----
            if (aspects && aspects.length > 0) {
                html += `<div class="aspect-list"><h4 style="margin:8px 0 4px; color:#c77dff;">⚡ Aspects</h4>`;
                aspects.forEach(a => {
                    const sym1 = planetDisplay[a.planet1]?.symbol || a.planet1;
                    const sym2 = planetDisplay[a.planet2]?.symbol || a.planet2;
                    html += `
                        <div class="aspect-item">
                            ${sym1} ${a.aspect.symbol} ${sym2} — 
                            <span class="aspect-type">${a.aspect.name}</span>
                            <span style="color:#4a3c5c;"> (orb ${a.orb.toFixed(1)}°)</span>
                            <span style="font-size:0.7rem; color:#6a5c7c;"> — ${a.aspect.description}</span>
                        </div>
                    `;
                });
                html += `</div>`;
            } else {
                html += `<div class="aspect-list"><p style="color:#4a3c5c; font-size:0.8rem;">No major aspects detected within 8° orb.</p></div>`;
            }

            return html;
        }

        // =============================================================
        // 6. FORM HANDLER
        // =============================================================
        document.getElementById('birthForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('birthName').value || 'You';
            const dateStr = document.getElementById('birthDate').value;
            const hour = parseInt(document.getElementById('birthHour').value) || 12;
            const minute = parseInt(document.getElementById('birthMinute').value) || 0;
            const location = document.getElementById('birthLocation').value || 'Unknown';

            if (!dateStr) {
                alert('Please enter your birth date.');
                return;
            }

            const birthDate = new Date(dateStr + 'T' + String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0') +
                ':00');

            const planets = calculatePlanets(birthDate);
            drawChart(planets, name, birthDate);

            // Calculate aspects
            const aspects = calculateAspects(planets, 8);

            const interpHtml = generateInterpretation(planets, name, aspects);
            document.getElementById('natal-interp').innerHTML = `
                <div style="font-size:0.75rem; color:#4a3c5c; margin-bottom:12px;">
                    🕒 ${birthDate.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})} &middot; 📍 ${location}
                </div>
                ${interpHtml}
            `;

            // Save to localStorage
            localStorage.setItem('natal-name', name);
            localStorage.setItem('natal-date', dateStr);
            localStorage.setItem('natal-time', `${hour}:${String(minute).padStart(2,'0')}`);
            localStorage.setItem('natal-location', location);
        });

        // =============================================================
        // 7. INIT – Pre‑fill and auto‑generate if data exists
        // =============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Pre-fill from main altar profile
            const savedName = localStorage.getItem('user-name') || '';
            const savedBirthday = localStorage.getItem('user-birthday') || '';

            if (savedName) document.getElementById('birthName').value = savedName;
            if (savedBirthday) document.getElementById('birthDate').value = savedBirthday;

            // Also check saved natal data
            const natalName = localStorage.getItem('natal-name');
            const natalDate = localStorage.getItem('natal-date');
            const natalTime = localStorage.getItem('natal-time');
            const natalLocation = localStorage.getItem('natal-location');

            if (natalName && natalDate) {
                document.getElementById('birthName').value = natalName;
                document.getElementById('birthDate').value = natalDate;
                if (natalTime) {
                    const parts = natalTime.split(':');
                    document.getElementById('birthHour').value = parseInt(parts[0]) || 12;
                    document.getElementById('birthMinute').value = parseInt(parts[1]) || 0;
                }
                if (natalLocation) document.getElementById('birthLocation').value = natalLocation;

                // Auto-generate chart
                document.getElementById('birthForm').dispatchEvent(new Event('submit'));
            }
        });

        console.log('✨ Natal Chart page loaded with aspects.');
        console.log('📡 Reading from localStorage...');
    </script>

</body>
</html>
