<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zodiac — Earth‑Centric Astrology</title>
    <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon" />
    <style>
        /* ===== Reset & Body ===== */
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            background-color: #0a0a12;
            color: #e2daeb;
        }

        /* ===== Sidebar Info Panel (Left) ===== */
        #sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            width: 220px;
            max-height: calc(100vh - 40px);
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #2a1f3d;
            border-radius: 16px;
            padding: 20px;
            z-index: 10;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }
        #sidebar::-webkit-scrollbar {
            width: 2px;
        }
        #sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: #9d4edd;
            border-radius: 10px;
        }

        #sidebar h2 {
            margin: 0 0 6px 0;
            font-size: 1.1rem;
            font-weight: normal;
            color: #c77dff;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a1f3d;
            padding-bottom: 8px;
        }
        #sidebar .subtitle {
            font-size: 0.7rem;
            color: #a092b8;
            margin-top: -4px;
            margin-bottom: 12px;
        }
        #sidebar hr {
            border: none;
            border-top: 1px solid #1f1a2e;
            margin: 10px 0;
        }

        .planet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(42, 31, 61, 0.3);
        }
        .planet-row .symbol {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }
        .planet-row .name {
            flex: 1;
            padding-left: 6px;
            color: #cbd5e1;
        }
        .planet-row .sign {
            font-weight: bold;
            color: #fff;
        }
        .planet-row .status {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }
        .planet-row .status.retrograde {
            color: #f87171;
            background: rgba(248, 113, 113, 0.15);
        }
        .planet-row .status.direct {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        #datetime {
            font-size: 0.8rem;
            font-family: monospace;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        #user-info {
            font-size: 0.85rem;
            color: #e2daeb;
            margin-bottom: 8px;
        }
        #user-info .highlight {
            color: #c77dff;
        }

        /* ===== Back Button (Top Right) ===== */
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(20, 16, 30, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #e2daeb;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid #3c2f5c;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            transition: all 0.25s ease-in-out;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }
        .back-btn:hover {
            background: #9d4edd;
            color: #fff;
            border-color: #c77dff;
            box-shadow: 0 0 24px rgba(157, 78, 221, 0.3);
        }

        /* ===== Canvas ===== */
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ===== Responsive tweaks ===== */
        @media (max-width: 768px) {
            #sidebar {
                left: 10px;
                top: 10px;
                width: 160px;
                padding: 12px;
                font-size: 0.7rem;
            }
            #sidebar h2 {
                font-size: 0.9rem;
            }
            .planet-row {
                font-size: 0.7rem;
            }
            .back-btn {
                top: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar">
        <h2>✦ Celestial Watch</h2>
        <div id="datetime">Loading time…</div>
        <div id="user-info">Welcome, Traveller</div>

        <hr />

        <div id="planetary-info">
            <!-- Planet rows will be injected here -->
        </div>

        <hr />
        <div style="font-size:0.65rem; color:#4a3c5c; text-align:center; margin-top:6px;">
            ⚡ Positions updated in real time
        </div>
    </div>

    <!-- ===== BACK BUTTON ===== -->
    <a href="digital-divination.html" class="back-btn">← Back to Altar</a>

    <!-- ===== CANVAS ===== -->
    <canvas id="canvas"></canvas>

    <script>
        // =============================================================
        // 1. SETUP
        // =============================================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H, cx, cy, radius;

        // Zodiac signs (fixed 30° segments)
        const zodiacSigns = [
            { symbol: '♈', name: 'Aries', start: 0 },
            { symbol: '♉', name: 'Taurus', start: 30 },
            { symbol: '♊', name: 'Gemini', start: 60 },
            { symbol: '♋', name: 'Cancer', start: 90 },
            { symbol: '♌', name: 'Leo', start: 120 },
            { symbol: '♍', name: 'Virgo', start: 150 },
            { symbol: '♎', name: 'Libra', start: 180 },
            { symbol: '♏', name: 'Scorpio', start: 210 },
            { symbol: '♐', name: 'Sagittarius', start: 240 },
            { symbol: '♑', name: 'Capricorn', start: 270 },
            { symbol: '♒', name: 'Aquarius', start: 300 },
            { symbol: '♓', name: 'Pisces', start: 330 }
        ];

        // Get zodiac sign info from an angle in degrees
        function getZodiacSign(angleDeg) {
            const normalized = ((angleDeg % 360) + 360) % 360;
            for (let i = 0; i < zodiacSigns.length; i++) {
                const start = zodiacSigns[i].start;
                const end = start + 30;
                if (normalized >= start && normalized < end) {
                    return zodiacSigns[i];
                }
            }
            return zodiacSigns[0]; // fallback
        }

        // Planet data
        // Speeds are degrees per day (approximate geocentric mean motion)
        const planetsConfig = {
            Sun: { color: '#FFD700', radius: 18, speed: 0.9856, label: '☀️', name: 'Sun', wobble: 0 },
            Moon: { color: '#C0C0C0', radius: 6, speed: 13.176, label: '🌙', name: 'Moon', wobble: 0 },
            Mercury: { color: '#B5B5B5', radius: 4, speed: 1.383, label: '☿', name: 'Mercury', wobble: 2.5 },
            Venus: { color: '#FFD700', radius: 7, speed: 0.615, label: '♀', name: 'Venus', wobble: 1.5 },
            Mars: { color: '#FF4500', radius: 6, speed: 0.524, label: '♂', name: 'Mars', wobble: 1.2 },
            Jupiter: { color: '#DAA520', radius: 12, speed: 0.083, label: '♃', name: 'Jupiter', wobble: 0.3 },
            Saturn: { color: '#B8860B', radius: 10, speed: 0.033, label: '♄', name: 'Saturn', wobble: 0.1 }
        };

        // Distance from Earth (scaled for visual clarity)
        const distances = {
            Sun: 1.0,
            Moon: 0.35,
            Mercury: 0.55,
            Venus: 0.75,
            Mars: 1.3,
            Jupiter: 2.4,
            Saturn: 3.4
        };

        // State
        let time = 0; // simulation days
        let lastTimestamp = 0;
        let animating = true;

        // =============================================================
        // 2. RESIZE
        // =============================================================
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            radius = Math.min(W, H) * 0.38;
        }
        window.addEventListener('resize', resize);
        resize();

        // =============================================================
        // 3. PLANET POSITIONS
        // =============================================================
        // We store angles in the planets object
        const planets = {};
        Object.keys(planetsConfig).forEach(key => {
            planets[key] = {
                angle: Math.random() * 360,
                speed: planetsConfig[key].speed,
                wobble: planetsConfig[key].wobble || 0
            };
        });

        function getPlanetAngle(key, day) {
            const p = planets[key];
            const baseAngle = (p.angle + p.speed * day) % 360;
            // Add wobble to simulate retrograde illusion for inner planets
            if (p.wobble > 0) {
                const wobbleFactor = 4 * p.wobble * Math.sin(2 * Math.PI * day / (360 / p.speed) * 0.5);
                return (baseAngle + wobbleFactor + 360) % 360;
            }
            return baseAngle;
        }

        function isRetrograde(key, day) {
            // Simple simulation: if the wobble causes the angle to decrease over a short interval
            const a1 = getPlanetAngle(key, day);
            const a2 = getPlanetAngle(key, day + 0.1);
            let diff = a2 - a1;
            if (diff < -180) diff += 360;
            if (diff > 180) diff -= 360;
            return diff < 0;
        }

        // =============================================================
        // 4. DRAW
        // =============================================================
        function draw(day) {
            ctx.clearRect(0, 0, W, H);

            // Background gradient
            const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.8);
            bg.addColorStop(0, '#1a1a2e');
            bg.addColorStop(1, '#0a0a12');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            ctx.translate(cx, cy);

            // ---- Zodiac Ring ----
            const zodiacRadius = radius * 1.2;
            ctx.strokeStyle = '#2a1f3d';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, zodiacRadius, 0, 2 * Math.PI);
            ctx.stroke();

            // Draw zodiac segments and labels
            zodiacSigns.forEach((sign, i) => {
                const startAngle = (sign.start - 90) * Math.PI / 180;
                const endAngle = (sign.start + 30 - 90) * Math.PI / 180;

                // Arc segment
                ctx.strokeStyle = '#3c2f5c';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, zodiacRadius, startAngle, endAngle);
                ctx.stroke();

                // Label
                const midAngle = (startAngle + endAngle) / 2;
                const labelR = zodiacRadius + 24;
                const x = labelR * Math.cos(midAngle);
                const y = labelR * Math.sin(midAngle);

                ctx.fillStyle = '#b0a4c4';
                ctx.font = '16px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${sign.symbol}`, x, y - 14);
                ctx.font = '9px Georgia';
                ctx.fillText(sign.name, x, y + 12);
            });

            // ---- Ecliptic grid lines ----
            for (let i = 0; i < 36; i++) {
                const angle = (i * 10) * Math.PI / 180;
                ctx.strokeStyle = 'rgba(30, 20, 40, 0.3)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(zodiacRadius * 1.3 * Math.cos(angle), zodiacRadius * 1.3 * Math.sin(angle));
                ctx.stroke();
            }

            // ---- Planets ----
            const planetKeys = Object.keys(planetsConfig);
            planetKeys.forEach((key) => {
                const config = planetsConfig[key];
                const angleRad = getPlanetAngle(key, day) * Math.PI / 180;
                const dist = distances[key] * radius * 0.3;

                const x = dist * Math.cos(angleRad);
                const y = dist * Math.sin(angleRad);

                // Glow
                const glow = ctx.createRadialGradient(x, y, 0, x, y, config.radius * 3);
                glow.addColorStop(0, config.color + '40');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, config.radius * 3, 0, 2 * Math.PI);
                ctx.fill();

                // Body
                ctx.shadowColor = config.color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = config.color;
                ctx.beginPath();
                ctx.arc(x, y, config.radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Label
                ctx.fillStyle = '#e2daeb';
                ctx.font = '10px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(config.label, x, y - config.radius - 4);
            });

            // ---- Earth centre marker ----
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#4ade8040';
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, 2 * Math.PI);
            ctx.fill();

            ctx.fillStyle = '#e2daeb';
            ctx.font = '12px Georgia';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('🌍 Earth', 0, 10);

            ctx.restore();
        }

        // =============================================================
        // 5. SIDEBAR UPDATE
        // =============================================================
        const planetDisplayOrder = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];

        function updateSidebar(day) {
            // Date / Time
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            const timeStr = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('datetime').innerHTML =
                `🕒 ${dateStr}<br><span style="font-size:0.7rem; color:#6a5c7c;">${timeStr} (your local time)</span>`;

            // User info from localStorage
            const userName = localStorage.getItem('user-name') || 'Traveller';
            const userBirthday = localStorage.getItem('user-birthday');
            let userInfoHtml = `👤 <span class="highlight">${userName}</span>`;
            if (userBirthday) {
                const bday = new Date(userBirthday + 'T00:00:00');
                const bdayStr = bday.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                userInfoHtml += ` &middot; 🎂 ${bdayStr}`;
            }
            document.getElementById('user-info').innerHTML = userInfoHtml;

            // Planetary info
            let html = '';
            planetDisplayOrder.forEach((key) => {
                const config = planetsConfig[key];
                const angle = getPlanetAngle(key, day);
                const sign = getZodiacSign(angle);
                const retro = isRetrograde(key, day);

                const statusClass = retro ? 'retrograde' : 'direct';
                const statusText = retro ? '⟲ Retro' : '⟳ Direct';

                html += `
                    <div class="planet-row">
                        <span class="symbol">${config.label}</span>
                        <span class="name">${config.name}</span>
                        <span class="sign">${sign.symbol} ${sign.name}</span>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                `;
            });
            document.getElementById('planetary-info').innerHTML = html;
        }

        // =============================================================
        // 6. ANIMATION LOOP
        // =============================================================
        let accumulatedTime = 0;

        function animate(timestamp) {
            if (!animating) return;

            if (!lastTimestamp) lastTimestamp = timestamp;
            const delta = Math.min((timestamp - lastTimestamp) / 1000, 0.1); // seconds
            lastTimestamp = timestamp;

            // 1 second = 1 real day in the simulation? No, let's make it 1 minute = 1 day for visible motion.
            // Actually, let's keep it slow enough to watch. 1 real second = 0.5 simulation days.
            const dayIncrement = delta * 0.5;
            time += dayIncrement;

            // Cap time to avoid floating point issues
            if (time > 100000) time = 0;

            // Draw the canvas
            draw(time);

            // Update the sidebar (every frame is fine, but we can throttle if needed)
            updateSidebar(time);

            requestAnimationFrame(animate);
        }

        // =============================================================
        // 7. START
        // =============================================================
        // Initialise planet angles to a nice starting layout
        const startAngles = {
            Sun: 45,
            Moon: 120,
            Mercury: 80,
            Venus: 15,
            Mars: 210,
            Jupiter: 290,
            Saturn: 345
        };
        Object.keys(planets).forEach(key => {
            if (startAngles[key]) planets[key].angle = startAngles[key];
        });

        // Start the loop
        requestAnimationFrame(animate);

        // =============================================================
        // 8. HANDLE WINDOW RESIZE (re-draw)
        // =============================================================
        window.addEventListener('resize', () => {
            resize();
        });

        console.log('✨ Astrology Simulator started.');
        console.log('📡 Fetching user data from localStorage...');
    </script>
</body>
</html>
