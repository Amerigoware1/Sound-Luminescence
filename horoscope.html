        }

        .nav-bar .back-btn:hover {

            padding: 20px;

            flex-wrap: wrap;
            gap: 24px;

        .interpretation .planet-entry .highlight {
            color: #c77dff;
        }
        .interpretation::-webkit-scrollbar {
            width: 2px;
        }
        .interpretation::-webkit-scrollbar-track {
            background: transparent;
        }
        .interpretation::-webkit-scrollbar-thumb {
            background: #9d4edd;
            border-radius: 10px;
        }

        /* ===== Daily Horoscope ===== */
        #daily-horoscope {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #2a1f3d;
            opacity: 0;
            animation: wavyFadeIn 2.5s ease forwards;

        #daily-horoscope .oracle {

            font-size: 0.9rem;

        #daily-horoscope .sign-badge {
            display: inline-block;

            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #3c2f5c;
        }
        /* Wavy fade-in animation */
        @keyframes wavyFadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
                filter: blur(4px);
            }
            30% {
                opacity: 0.5;
                transform: translateY(-4px) scale(1.01);
                filter: blur(0);
            }
            60% {
                opacity: 0.8;
                transform: translateY(6px) scale(0.99);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .container {

            }

    <script>
        // =============================================================
        // 1. ZODIAC & PLANET DATA
        // =============================================================
        const zodiacSigns = [
            { symbol: '♈', name: 'Aries', start: 0, element: 'Fire', ruler: 'Mars' },
            { symbol: '♉', name: 'Taurus', start: 30, element: 'Earth', ruler: 'Venus' },
            { symbol: '♊', name: 'Gemini', start: 60, element: 'Air', ruler: 'Mercury' },
            { symbol: '♋', name: 'Cancer', start: 90, element: 'Water', ruler: 'Moon' },
            { symbol: '♌', name: 'Leo', start: 120, element: 'Fire', ruler: 'Sun' },
            { symbol: '♍', name: 'Virgo', start: 150, element: 'Earth', ruler: 'Mercury' },
            { symbol: '♎', name: 'Libra', start: 180, element: 'Air', ruler: 'Venus' },
            { symbol: '♏', name: 'Scorpio', start: 210, element: 'Water', ruler: 'Pluto' },
            { symbol: '♐', name: 'Sagittarius', start: 240, element: 'Fire', ruler: 'Jupiter' },
            { symbol: '♑', name: 'Capricorn', start: 270, element: 'Earth', ruler: 'Saturn' },
            { symbol: '♒', name: 'Aquarius', start: 300, element: 'Air', ruler: 'Uranus' },
            { symbol: '♓', name: 'Pisces', start: 330, element: 'Water', ruler: 'Neptune' }
        ];

        function getZodiacSign(angleDeg) {
            const normalized = ((angleDeg % 360) + 360) % 360;
            for (let i = 0; i < zodiacSigns.length; i++) {
                const start = zodiacSigns[i].start;
                const end = start + 30;
                if (normalized >= start && normalized < end) {
                    return zodiacSigns[i];
                }
            }
            return zodiacSigns[0];
        }

        // Get today's Sun sign (using current date and approximate Sun speed)
        function getTodaySunSign() {
            // Reference: Jan 1, 2025 at noon UTC, Sun was at ~280.46° (approximate)
            const epoch = new Date(Date.UTC(2025, 0, 1, 12, 0, 0));
            const now = new Date();
            const diffDays = (now.getTime() - epoch.getTime()) / (1000 * 60 * 60 * 24);
            const sunAngle = (280.46 + 0.9856 * diffDays) % 360;
            return getZodiacSign(sunAngle);
        }

        // =============================================================
        // 2. PLANETARY CALCULATION (for natal chart)
        // =============================================================
        const planetSpeeds = {
            Sun: 0.9856,
            Moon: 13.176,
            Mercury: 1.383,
            Venus: 0.615,
            Mars: 0.524,
            Jupiter: 0.083,
            Saturn: 0.033
        };

        const planetDisplay = {
            Sun: { symbol: '☀️', name: 'Sun' },
            Moon: { symbol: '🌙', name: 'Moon' },
            Mercury: { symbol: '☿', name: 'Mercury' },
            Venus: { symbol: '♀', name: 'Venus' },
            Mars: { symbol: '♂', name: 'Mars' },
            Jupiter: { symbol: '♃', name: 'Jupiter' },
            Saturn: { symbol: '♄', name: 'Saturn' }
        };

        const refAngles = {
            Sun: 280.46,
            Moon: 215.67,
            Mercury: 245.12,
            Venus: 185.34,
            Mars: 120.78,
            Jupiter: 45.23,
            Saturn: 320.56
        };

        function getPlanetAngle(planet, daysSinceEpoch) {
            const baseAngle = refAngles[planet] || 0;
            const speed = planetSpeeds[planet] || 0;
            return (baseAngle + speed * daysSinceEpoch) % 360;
        }

        function daysSinceEpoch(date) {
            const epoch = new Date(Date.UTC(2000, 0, 1, 12, 0, 0));
            const diffMs = date.getTime() - epoch.getTime();
            return diffMs / (1000 * 60 * 60 * 24);
        }

        function calculatePlanets(birthDate) {
            const days = daysSinceEpoch(birthDate);
            const planets = {};
            Object.keys(planetSpeeds).forEach(key => {
                const angle = getPlanetAngle(key, days);
                const sign = getZodiacSign(angle);
                planets[key] = {
                    angle: angle,
                    sign: sign,
                    display: planetDisplay[key]
                };
            });
            return planets;
        }

        // =============================================================
        // 3. DRAW CHART
        // =============================================================
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const size = Math.min(rect.width - 40, 500);
            canvas.width = size;
            canvas.height = size;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawChart(planets, birthName, birthDate) {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const radius = Math.min(w, h) * 0.42;

            ctx.clearRect(0, 0, w, h);

            const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.4);
            bg.addColorStop(0, '#1a1a2e');
            bg.addColorStop(1, '#0a0a12');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.translate(cx, cy);

            // Outer ring
            ctx.strokeStyle = '#2a1f3d';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, 2 * Math.PI);
            ctx.stroke();

            // Zodiac ring
            zodiacSigns.forEach((sign, i) => {
                const startAngle = (sign.start - 90) * Math.PI / 180;
                const endAngle = (sign.start + 30 - 90) * Math.PI / 180;

                ctx.strokeStyle = '#3c2f5c';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.stroke();

                const midAngle = (startAngle + endAngle) / 2;
                const labelR = radius + 22;
                const x = labelR * Math.cos(midAngle);
                const y = labelR * Math.sin(midAngle);

                ctx.fillStyle = '#b0a4c4';
                ctx.font = '13px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${sign.symbol}`, x, y - 12);
                ctx.font = '8px Georgia';
                ctx.fillText(sign.name, x, y + 12);
            });

            // Inner circles
            ctx.strokeStyle = 'rgba(42, 31, 61, 0.3)';
            ctx.lineWidth = 0.5;
            [0.7, 0.4].forEach(ratio => {
                ctx.beginPath();
                ctx.arc(0, 0, radius * ratio, 0, 2 * Math.PI);
                ctx.stroke();
            });

            // Grid lines
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                ctx.strokeStyle = 'rgba(42, 31, 61, 0.2)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(radius * 0.95 * Math.cos(angle), radius * 0.95 * Math.sin(angle));
                ctx.stroke();
            }

            // Planets
            const planetKeys = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
            const planetRadius = radius * 0.75;

            planetKeys.forEach((key) => {
                const data = planets[key];
                if (!data) return;
                const angleRad = (data.angle - 90) * Math.PI / 180;
                const dist = planetRadius * (0.25 + (planetKeys.indexOf(key) / planetKeys.length) * 0.6);
                const x = dist * Math.cos(angleRad);
                const y = dist * Math.sin(angleRad);

                const glow = ctx.createRadialGradient(x, y, 0, x, y, 12);
                glow.addColorStop(0, '#c77dff30');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, 2 * Math.PI);
                ctx.fill();

                ctx.fillStyle = '#c77dff';
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.fill();

                ctx.fillStyle = '#e2daeb';
                ctx.font = '8px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                const label = planetDisplay[key]?.symbol || key;
                ctx.fillText(label, x, y - 8);

                ctx.fillStyle = '#a092b8';
                ctx.font = '7px Georgia';
                ctx.textBaseline = 'top';
                ctx.fillText(data.sign.symbol, x + 6, y + 4);
            });

            // Center label
            ctx.fillStyle = '#4ade80';
            ctx.font = '14px Georgia';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☉', 0, -10);
            ctx.fillStyle = '#a092b8';
            ctx.font = '8px Georgia';
            ctx.textBaseline = 'top';
            ctx.fillText(birthName || 'Birth Chart', 0, 8);

            ctx.restore();

            const infoEl = document.getElementById('chartInfo');
            const dateStr = birthDate ? new Date(birthDate).toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }) : 'Unknown date';
            infoEl.textContent = `${birthName || 'Your'} chart – ${dateStr}`;
        }

        // =============================================================
        // 4. INTERPRETATION (Natal)
        // =============================================================
        function generateInterpretation(planets, birthName) {
            const keys = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
            let html = '';

            keys.forEach(key => {
                const data = planets[key];
                if (!data) return;
                const display = planetDisplay[key];
                const sign = data.sign;

                const interpretations = {
                    Sun: `Your core identity and vitality. You express yourself through ${sign.name} energy.`,
                    Moon: `Your emotional nature and inner world. You feel most at home with ${sign.name} qualities.`,
                    Mercury: `Your communication style and thinking. You process information through ${sign.name} intuition.`,
                    Venus: `Your love language and values. You attract and appreciate ${sign.name} energy.`,
                    Mars: `Your drive and ambition. You pursue goals with ${sign.name} determination.`,
                    Jupiter: `Your growth and expansion. You find meaning through ${sign.name} wisdom.`,
                    Saturn: `Your discipline and structure. You build foundations with ${sign.name} integrity.`
                };

                html += `
                    <div class="planet-entry">
                        <span class="symbol">${display.symbol}</span>
                        <strong>${display.name}</strong> in <span class="highlight">${sign.symbol} ${sign.name}</span>
                        <br />
                        <span style="font-size:0.75rem; color:#94a3b8;">${interpretations[key] || 'A unique expression of this placement.'}</span>
                    </div>
                `;
            });

            return html;
        }

                    "Your humanitarian side shines. Get involved in a collective effort. Technology aids your plans.",
                    "Aquarius, think outside the box. A breakthrough idea is on the horizon."
                ],
                Pisces: [
                    "Dreams and intuition guide you. A creative project or spiritual practice brings deep fulfilment.",
                    "Your empathy is your gift. Help someone in need – it heals you both. Artistic expression flows.",
                    "Pisces, your sensitivity is your strength. Trust your visions and share them softly."
                ]
            };

            // Select a random snippet for this sign
            const snippets = horoscopeTemplates[signName] || ["Today is full of possibility. Trust your inner guidance."];
            const randomIndex = Math.floor(Math.random() * snippets.length);
            const horoscopeText = snippets[randomIndex];

            // Add a personal greeting
            const greeting = userName ? `✨ ${userName}, your daily guidance for ${signName}:` :
                `✨ Today's guidance for ${signName}:`;

            return {
                sign: todaySign,
                greeting: greeting,
                text: horoscopeText
            };
        }

        // =============================================================
        // 6. DISPLAY DAILY HOROSCOPE (with wavy fade‑in)
        // =============================================================
        function displayDailyHoroscope(userName) {
            const loadingEl = document.getElementById('horoscope-loading');
            const contentEl = document.getElementById('horoscope-content');
            const container = document.getElementById('daily-horoscope');

            if (!userName || !localStorage.getItem('user-birthday')) {
                loadingEl.textContent = '🌙 Set your name and birthday in the Altar to receive daily guidance.';
                return;
            }

            // Show loading message
            loadingEl.textContent = '🔮 Consulting the Oracle…';
            contentEl.style.display = 'none';

            // After 3 seconds, generate and display
            setTimeout(() => {
                const horoscope = generateDailyHoroscope(userName);
                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';
                contentEl.innerHTML = `
                    <div class="oracle">${horoscope.greeting}</div>
                    <div class="sign-badge">${horoscope.sign.symbol} ${horoscope.sign.name}</div>
                    <div class="horoscope-text">${horoscope.text}</div>
                `;
                // The animation is applied via CSS (opacity:0 → 1 with wavy keyframes)
                container.style.animation = 'wavyFadeIn 2.5s ease forwards';
            }, 3000);
        }

        // =============================================================
        // 7. FORM HANDLER
        // =============================================================
        document.getElementById('birthForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('birthName').value || 'You';
            const dateStr = document.getElementById('birthDate').value;
            const hour = parseInt(document.getElementById('birthHour').value) || 12;
            const minute = parseInt(document.getElementById('birthMinute').value) || 0;
            const location = document.getElementById('birthLocation').value || 'Unknown';

            if (!dateStr) {
                alert('Please enter your birth date.');
                return;
            }

            const birthDate = new Date(dateStr + 'T' + String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0') +
                ':00');

            const planets = calculatePlanets(birthDate);
            drawChart(planets, name, birthDate);

            const interpHtml = generateInterpretation(planets, name);
            document.getElementById('natal-interp').innerHTML = `
                <div style="font-size:0.75rem; color:#4a3c5c; margin-bottom:12px;">
                    🕒 ${birthDate.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})} &middot; 📍 ${location}
                </div>
                ${interpHtml}
            `;

            // Save to localStorage
            localStorage.setItem('natal-name', name);
            localStorage.setItem('natal-date', dateStr);
            localStorage.setItem('natal-time', `${hour}:${String(minute).padStart(2,'0')}`);
            localStorage.setItem('natal-location', location);
        });

        // =============================================================
        // 8. INIT – Pre‑fill and trigger daily horoscope
        // =============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Pre-fill from main altar profile
            const savedName = localStorage.getItem('user-name') || '';
            const savedBirthday = localStorage.getItem('user-birthday') || '';

            if (savedName) document.getElementById('birthName').value = savedName;
            if (savedBirthday) document.getElementById('birthDate').value = savedBirthday;

            // Also check saved natal data
            const natalName = localStorage.getItem('natal-name');
            const natalDate = localStorage.getItem('natal-date');
            const natalTime = localStorage.getItem('natal-time');
            const natalLocation = localStorage.getItem('natal-location');

            if (natalName && natalDate) {
                document.getElementById('birthName').value = natalName;
                document.getElementById('birthDate').value = natalDate;
                if (natalTime) {
                    const parts = natalTime.split(':');
                    document.getElementById('birthHour').value = parseInt(parts[0]) || 12;
                    document.getElementById('birthMinute').value = parseInt(parts[1]) || 0;
                }
                if (natalLocation) document.getElementById('birthLocation').value = natalLocation;

                // Auto-generate chart
                document.getElementById('birthForm').dispatchEvent(new Event('submit'));
            }

            // ---- Daily Horoscope ----
            const userName = savedName || natalName || '';
            if (userName && savedBirthday) {
                // Display daily horoscope after a short delay
                displayDailyHoroscope(userName);
            } else {
                // Show a message if no user data
                document.getElementById('horoscope-loading').textContent =
                    '🌙 Set your name and birthday in the Altar to receive daily guidance.';
            }
        });

        console.log('✨ Astrology page loaded. Daily horoscope ready.');
    </script>

</body>
</html>
