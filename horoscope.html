<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Horoscope — Digital Divination</title>
    <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon" />

    <!-- SunCalc library for Moon position -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js">
    </script>

    <style>
        /* ===== Global Reset ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            background: #0a0a12;
            color: #e2daeb;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== Nav Bar ===== */
        .nav-bar {
            width: 100%;
            padding: 14px 24px;
            background: rgba(10, 10, 18, 0.92);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a1f3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-bar .title {
            font-size: 1.2rem;
            color: #c77dff;
            letter-spacing: 1px;
        }
        .nav-bar .title span {
            color: #4a3c5c;
            font-size: 0.8rem;
            font-weight: normal;
        }
        .nav-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-bar .nav-link {
            color: #b0a4c4;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid #3c2f5c;
            border-radius: 50px;
            transition: all 0.25s;
            font-size: 0.85rem;
        }
        .nav-bar .nav-link:hover {
            background: #9d4edd;
            color: #fff;
            border-color: #c77dff;
        }

        /* ===== Main Container ===== */
        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 24px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        /* ===== Greeting ===== */
        .greeting {
            font-size: 1.6rem;
            color: #e2daeb;
            margin-bottom: 8px;
            text-align: center;
        }
        .greeting .highlight {
            color: #c77dff;
        }
        .sub-greeting {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 30px;
            text-align: center;
            font-style: italic;
        }

        /* ===== Loading / Oracle Message ===== */
        #oracle-loading {
            font-size: 1.1rem;
            color: #4a3c5c;
            font-style: italic;
            padding: 40px 0;
            text-align: center;
            letter-spacing: 2px;
        }
        #oracle-loading .dots::after {
            content: '…';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% {
                content: '…';
            }
            25% {
                content: '⋯';
            }
            50% {
                content: '⋮';
            }
            75% {
                content: '⋯';
            }
            100% {
                content: '…';
            }
        }

        /* ===== Horoscope Card ===== */
        #horoscope-card {
            width: 100%;
            max-width: 640px;
            background: rgba(20, 16, 30, 0.6);
            border: 1px solid #2a1f3d;
            border-radius: 24px;
            padding: 32px 36px;
            backdrop-filter: blur(4px);
            opacity: 0;
            animation: wavyFadeIn 2.8s ease forwards;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            display: none;
        }

        /* Wavy fade-in animation */
        @keyframes wavyFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
                filter: blur(6px);
            }
            25% {
                opacity: 0.3;
                transform: translateY(-6px) scale(1.01);
                filter: blur(2px);
            }
            50% {
                opacity: 0.6;
                transform: translateY(8px) scale(0.99);
                filter: blur(0);
            }
            75% {
                opacity: 0.85;
                transform: translateY(-2px) scale(1.005);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ===== Horoscope Content ===== */
        .horoscope-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid #2a1f3d;
        }
        .horoscope-header .date {
            font-size: 0.8rem;
            color: #4a3c5c;
            font-family: monospace;
        }
        .sign-badge {
            display: inline-block;
            background: rgba(157, 78, 221, 0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #3c2f5c;
            color: #c77dff;
        }
        .sign-badge.moon {
            border-color: #4a3c5c;
            color: #94a3b8;
        }

        .horoscope-text {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #cbd5e1;
            margin: 16px 0 20px;
            padding: 0 4px;
        }

        .horoscope-footer {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 24px;
            padding-top: 14px;
            border-top: 1px solid #1f1a2e;
            font-size: 0.8rem;
            color: #6a5c7c;
        }
        .horoscope-footer .lucky {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .horoscope-footer .lucky span {
            color: #e2daeb;
            font-weight: bold;
        }

        /* ===== Error / No Data ===== */
        .no-data {
            text-align: center;
            color: #4a3c5c;
            padding: 40px 20px;
            font-style: italic;
            line-height: 1.8;
        }
        .no-data a {
            color: #c77dff;
            text-decoration: none;
            border-bottom: 1px dotted #3c2f5c;
        }
        .no-data a:hover {
            color: #fff;
            border-bottom-color: #c77dff;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .container {
                padding: 20px 16px 40px;
            }
            .greeting {
                font-size: 1.2rem;
            }
            #horoscope-card {
                padding: 20px 18px;
            }
            .horoscope-text {
                font-size: 0.95rem;
            }
            .nav-bar .title {
                font-size: 1rem;
            }
            .nav-bar .nav-link {
                font-size: 0.75rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAV BAR ===== -->
    <div class="nav-bar">
        <div class="title">✦ Horoscope <span>daily guidance</span></div>
        <div class="nav-group">
            <a href="astrology.html" class="nav-link">🌌 Astrology</a>
            <a href="natal.html" class="nav-link">🌙 Natal Chart</a>
            <a href="digital-divination.html" class="nav-link">← Altar</a>
        </div>
    </div>

    <!-- ===== MAIN ===== -->
    <div class="container">

        <!-- Greeting -->
        <div class="greeting" id="greeting">✨ <span class="highlight" id="userNameDisplay">Traveller</span></div>
        <div class="sub-greeting" id="subGreeting">The Oracle speaks…</div>

        <!-- Loading -->
        <div id="oracle-loading">
            <span class="dots">Consulting the Oracle</span>
        </div>

        <!-- Horoscope Card -->
        <div id="horoscope-card">
            <div class="horoscope-header">
                <div>
                    <span class="sign-badge" id="sunSignBadge">♈ Sun</span>
                    <span class="sign-badge moon" id="moonSignBadge">🌙 Moon</span>
                </div>
                <div class="date" id="todayDate"></div>
            </div>
            <div class="horoscope-text" id="horoscopeText">
                Your daily guidance awaits…
            </div>
            <div class="horoscope-footer">
                <div class="lucky">🎯 Lucky Number: <span id="luckyNumber">—</span></div>
                <div class="lucky">🎨 Lucky Color: <span id="luckyColor">—</span></div>
                <div class="lucky">😊 Mood: <span id="mood">—</span></div>
                <div class="lucky">💞 Compatibility: <span id="compatibility">—</span></div>
            </div>
        </div>

    </div>

    <!-- ============================================================ -->
    <!-- ======================== SCRIPT ============================= -->
    <!-- ============================================================ -->
    <script>
        // =============================================================
        // 1. ZODIAC DATA
        // =============================================================
        const zodiacSigns = [
            { symbol: '♈', name: 'Aries', start: 0 },
            { symbol: '♉', name: 'Taurus', start: 30 },
            { symbol: '♊', name: 'Gemini', start: 60 },
            { symbol: '♋', name: 'Cancer', start: 90 },
            { symbol: '♌', name: 'Leo', start: 120 },
            { symbol: '♍', name: 'Virgo', start: 150 },
            { symbol: '♎', name: 'Libra', start: 180 },
            { symbol: '♏', name: 'Scorpio', start: 210 },
            { symbol: '♐', name: 'Sagittarius', start: 240 },
            { symbol: '♑', name: 'Capricorn', start: 270 },
            { symbol: '♒', name: 'Aquarius', start: 300 },
            { symbol: '♓', name: 'Pisces', start: 330 }
        ];

        function getZodiacByAngle(angleDeg) {
            const normalized = ((angleDeg % 360) + 360) % 360;
            for (let i = 0; i < zodiacSigns.length; i++) {
                const start = zodiacSigns[i].start;
                const end = start + 30;
                if (normalized >= start && normalized < end) {
                    return zodiacSigns[i];
                }
            }
            return zodiacSigns[0];
        }

        // =============================================================
        // 2. GET TODAY'S SUN SIGN (approximate, from date)
        // =============================================================
        function getTodaySunSign() {
            const epoch = new Date(Date.UTC(2025, 0, 1, 12, 0, 0));
            const now = new Date();
            const diffDays = (now.getTime() - epoch.getTime()) / (1000 * 60 * 60 * 24);
            const sunAngle = (280.46 + 0.9856 * diffDays) % 360;
            return getZodiacByAngle(sunAngle);
        }

        // =============================================================
        // 3. GET MOON SIGN using SunCalc library
        // =============================================================
        function getMoonSign() {
            const now = new Date();
            // Get moon position (ecliptic longitude)
            const moonPos = SunCalc.getMoonPosition(now, 0, 0);
            // Moon's ecliptic longitude is approximately its azimuth
            // SunCalc gives us right ascension and declination, but we need ecliptic longitude.
            // Alternative: use SunCalc.getMoonIllumination which gives phase, not position.
            // We'll use a simple approximation: moon's zodiac sign can be estimated from its phase and position.
            // A more accurate method: use the moon's ecliptic longitude.
            // SunCalc doesn't directly give ecliptic longitude, but we can approximate.
            // For our purposes, we'll use a simplified calculation based on the moon's age.
            const illumination = SunCalc.getMoonIllumination(now);
            // Moon's approximate ecliptic longitude: 0° at new moon, increases ~13.176° per day
            // Reference: New moon on 2025-01-29 12:36 UTC
            const newMoonRef = new Date(Date.UTC(2025, 0, 29, 12, 36, 0));
            const daysSinceNewMoon = (now.getTime() - newMoonRef.getTime()) / (1000 * 60 * 60 * 24);
            // Moon moves ~13.176° per day through the zodiac
            const moonAngle = (13.176 * daysSinceNewMoon) % 360;
            return getZodiacByAngle(moonAngle);
        }

        // =============================================================
        // 4. FETCH HOROSCOPE FROM Aztro API
        // =============================================================
        async function fetchHoroscope(signName) {
            const signMap = {
                'Aries': 'aries',
                'Taurus': 'taurus',
                'Gemini': 'gemini',
                'Cancer': 'cancer',
                'Leo': 'leo',
                'Virgo': 'virgo',
                'Libra': 'libra',
                'Scorpio': 'scorpio',
                'Sagittarius': 'sagittarius',
                'Capricorn': 'capricorn',
                'Aquarius': 'aquarius',
                'Pisces': 'pisces'
            };
            const signKey = signMap[signName] || 'aries';
            const url = `https://aztro.sameerkumar.website/?sign=${signKey}&day=today`;

            try {
                const response = await fetch(url, { method: 'POST' });
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();
                return data;
            } catch (error) {
                console.warn('Horoscope API error:', error);
                return null;
            }
        }

        // =============================================================
        // 5. DISPLAY HOROSCOPE
        // =============================================================
        function displayHoroscope(data, userName, sunSign, moonSign) {
            const loadingEl = document.getElementById('oracle-loading');
            const cardEl = document.getElementById('horoscope-card');

            if (!data) {
                loadingEl.innerHTML = '🌙 The Oracle is silent…<br><span style="font-size:0.8rem;color:#4a3c5c;">Please try again later.</span>';
                return;
            }

            // Hide loading, show card
            loadingEl.style.display = 'none';
            cardEl.style.display = 'block';

            // Update greeting
            document.getElementById('userNameDisplay').textContent = userName || 'Traveller';
            document.getElementById('subGreeting').textContent =
                `☀️ ${sunSign.symbol} ${sunSign.name} · 🌙 ${moonSign.symbol} ${moonSign.name}`;

            // Date
            const now = new Date();
            document.getElementById('todayDate').textContent =
                now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            // Sun & Moon badges
            document.getElementById('sunSignBadge').textContent = `${sunSign.symbol} ${sunSign.name} (Sun)`;
            document.getElementById('moonSignBadge').textContent = `🌙 ${moonSign.symbol} ${moonSign.name} (Moon)`;

            // Horoscope text
            document.getElementById('horoscopeText').textContent = data.description || 'The stars are aligned in your favour.';

            // Footer details
            document.getElementById('luckyNumber').textContent = data.lucky_number || '—';
            document.getElementById('luckyColor').textContent = data.color || '—';
            document.getElementById('mood').textContent = data.mood || '—';
            document.getElementById('compatibility').textContent = data.compatibility || '—';
        }

        // =============================================================
        // 6. MAIN INIT
        // =============================================================
        async function initHoroscope() {
            // Get user data from localStorage
            const userName = localStorage.getItem('user-name') || 'Traveller';
            const userBirthday = localStorage.getItem('user-birthday');

            // If no birthday, show message and stop
            if (!userBirthday) {
                document.getElementById('greeting').innerHTML = '✨ <span class="highlight">Traveller</span>';
                document.getElementById('subGreeting').textContent = 'Set your name and birthday in the Altar.';
                document.getElementById('oracle-loading').innerHTML = `
                    <div class="no-data">
                        🌙 To receive your daily horoscope, please set your<br>
                        <strong>Name</strong> and <strong>Birthday</strong> in the main Altar.<br><br>
                        <a href="digital-divination.html">← Return to the Altar</a>
                    </div>
                `;
                return;
            }

            // Update greeting with user name
            document.getElementById('userNameDisplay').textContent = userName;

            // Get today's Sun and Moon signs
            const sunSign = getTodaySunSign();
            const moonSign = getMoonSign();

            // Fetch horoscope from API
            const horoscopeData = await fetchHoroscope(sunSign.name);

            // Display after a short delay (for dramatic effect)
            setTimeout(() => {
                displayHoroscope(horoscopeData, userName, sunSign, moonSign);
            }, 2200);
        }

        // =============================================================
        // 7. START
        // =============================================================
        document.addEventListener('DOMContentLoaded', initHoroscope);

        console.log('✨ Horoscope page loaded.');
        console.log('📡 Reading from localStorage...');
    </script>

</body>
</html>
