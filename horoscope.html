        function getZodiacByAngle(angleDeg) {
            const normalized = ((angleDeg % 360) + 360) % 360;
            for (let i = 0; i < zodiacSigns.length; i++) {
                const start = zodiacSigns[i].start;
                const end = start + 30;
                if (normalized >= start && normalized < end) {
                    return zodiacSigns[i];
                }
            }
            return zodiacSigns[0];
        }

        // Chinese zodiac year cycle (2024 is Dragon)
        function getChineseZodiac(birthYear) {
            const baseYear = 2024; // Dragon
            const baseIndex = 4; // Dragon is at index 4
            const diff = birthYear - baseYear;
            const index = ((diff % 12) + 12) % 12;
            return chineseAnimals[(baseIndex + index) % 12];
        }

        // =============================================================
        // 3. GET TODAY'S SUN SIGN
        // =============================================================
        function getTodaySunSign() {
            const epoch = new Date(Date.UTC(2025, 0, 1, 12, 0, 0));
            const now = new Date();
            const diffDays = (now.getTime() - epoch.getTime()) / (1000 * 60 * 60 * 24);
            const sunAngle = (280.46 + 0.9856 * diffDays) % 360;
            return getZodiacByAngle(sunAngle);
        }

        // =============================================================
        // 4. GET MOON SIGN
        // =============================================================
        function getMoonSign() {
            const now = new Date();
            const newMoonRef = new Date(Date.UTC(2025, 0, 29, 12, 36, 0));
            const daysSinceNewMoon = (now.getTime() - newMoonRef.getTime()) / (1000 * 60 * 60 * 24);
            const moonAngle = (13.176 * daysSinceNewMoon) % 360;
            return getZodiacByAngle(moonAngle);

        // =============================================================
        // 6. FETCH HOROSCOPE FROM API (with fallback)
        // =============================================================
        async function fetchHoroscope(signName) {
            const signMap = {
                'Aries': 'aries',
                'Taurus': 'taurus',
                'Gemini': 'gemini',
                'Cancer': 'cancer',
                'Leo': 'leo',
                'Virgo': 'virgo',
                'Libra': 'libra',

                'Sagittarius': 'sagittarius',
                'Capricorn': 'capricorn',
                'Aquarius': 'aquarius',
                'Pisces': 'pisces'
            };
            const signKey = signMap[signName] || 'aries';
            const url = `https://aztro.sameerkumar.website/?sign=${signKey}&day=today`;

            try {
                const response = await fetch(url, { method: 'POST' });
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();
                return { success: true, data: data, source: 'api' };
            } catch (error) {
                console.warn('Horoscope API error, using fallback:', error);
                return { success: false, source: 'local' };

            // Random details for local version
            const luckyNumbers = [3, 7, 12, 21, 33, 42, 55, 77, 88, 99];
            const colors = ['Crimson', 'Sapphire', 'Emerald', 'Gold', 'Silver', 'Amethyst', 'Rose', 'Indigo', 'Copper', 'Ivory'];
            const moods = ['Playful', 'Calm', 'Energetic', 'Reflective', 'Bold', 'Peaceful', 'Curious', 'Joyful', 'Serene',
                'Focused'
            ];
            const compatibilities = ['Aries', 'Taurus', 'Gemini', 'Cancer', 'Leo', 'Virgo', 'Libra', 'Scorpio', 'Sagittarius',
                'Capricorn', 'Aquarius', 'Pisces'
            ];

            document.getElementById('luckyNumber').textContent = luckyNumbers[Math.floor(Math.random() * luckyNumbers.length)];
            document.getElementById('luckyColor').textContent = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('mood').textContent = moods[Math.floor(Math.random() * moods.length)];
            document.getElementById('compatibility').textContent = compatibilities[Math.floor(Math.random() * compatibilities
                .length)];

            statusEl.textContent = '✦ Oracle reading from the local spirits ✦';
            statusEl.className = 'api-status offline';
        }

        // =============================================================
        // 8. MAIN INIT
        // =============================================================
        async function initHoroscope() {
            const userName = localStorage.getItem('user-name') || 'Traveller';
            const userBirthday = localStorage.getItem('user-birthday');

            if (!userBirthday) {
                document.getElementById('greeting').innerHTML = '✨ <span class="highlight">Traveller</span>';
                document.getElementById('subGreeting').textContent = 'Set your name and birthday in the Altar.';
                document.getElementById('oracle-loading').innerHTML = `
                    <div class="no-data">
                        🌙 To receive your daily horoscope, please set your<br>
                        <strong>Name</strong> and <strong>Birthday</strong> in the main Altar.<br><br>
                        <a href="digital-divination.html">← Return to the Altar</a>
                    </div>
                `;
                return;
            }

            // Get birth year for Chinese zodiac
            const birthDate = new Date(userBirthday + 'T00:00:00');
            const birthYear = birthDate.getFullYear();
            const chineseAnimal = getChineseZodiac(birthYear);

            document.getElementById('userNameDisplay').textContent = userName;

            const sunSign = getTodaySunSign();
            const moonSign = getMoonSign();

            // Try API first, but we already have the local fallback ready
            const apiResult = await fetchHoroscope(sunSign.name);

            // Display after dramatic delay
            setTimeout(() => {
                displayHoroscope(apiResult, userName, sunSign, moonSign, chineseAnimal);
            }, 2200);
        }

        // =============================================================
        // 9. START
        // =============================================================
        document.addEventListener('DOMContentLoaded', initHoroscope);

        console.log('✨ Horoscope page loaded (with Chinese zodiac integration).');
        console.log('📡 Reading from localStorage...');
    </script>
