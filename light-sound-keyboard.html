<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chakra Light – Sound Lens</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.39/Tone.js"></script>
  <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0a0a0f;
      color: #f0ece4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 20px;
      user-select: none;
    }
    .app-title {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 24px;
    }

    /* ─── LENS WRAPPER (allows glow to bleed out) ─── */
    .lens-wrapper {
      position: relative;
      width: 240px;
      height: 240px;
      margin-bottom: 20px;
    }

    #colorCircle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0a0a0f;
      box-shadow: none;
      transition: background 0.35s ease, box-shadow 0.6s ease, filter 0.6s ease;
      border: 2px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 2;
      mix-blend-mode: screen; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Lens flare (static highlight) */
    #colorCircle::before {
      content: '';
      position: absolute;
      top: 6%;
      left: 18%;
      width: 38%;
      height: 26%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.55) 0%, transparent 72%);
      pointer-events: none;
      opacity: 0.7;
      transition: opacity 0.4s ease;
    }

    /* Lens rim ring */
    .lens-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
      z-index: 1; 
    }
    .lens-ring::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.03);
    }

    #chakraSymbol {
      width: 50%; 
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none; 
      z-index: 3;
    }

    #colorCircle.active #chakraSymbol {
      opacity: 0.85; 
      transform: scale(1);
    }

    #chakraSymbol svg {
      width: 100%;
      height: 100%;
      fill: #ffffff; 
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    /* active glow and pulse */
    #colorCircle.active {
      background: var(--active-grad) !important;
      box-shadow: 
        0 0 80px var(--glow-color),
        0 0 200px var(--glow-color),
        0 0 400px var(--glow-color),
        0 0 700px var(--glow-color),
        inset 0 -30px 60px rgba(0,0,0,0.4) !important;
      filter: drop-shadow(0 0 120px var(--glow-color)) !important;
      animation: lensPulse 2.2s ease-in-out infinite;
    }
    @keyframes lensPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    /* ─── TEXT DISPLAY ─── */
    #infoDisplay {
      max-width: 460px;
      min-height: 120px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      text-align: center;
      width: 100%;
    }
    #infoDisplay .note-badge {
      display: inline-block;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #infoDisplay .chakra-name {
      font-size: 1.1rem;
      font-weight: 500;
      color: #d4cfc7;
      margin: 4px 0 2px;
    }
    #infoDisplay .lore {
      font-size: 0.95rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
      font-style: italic;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
    }
    #infoDisplay .freq-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
      flex-wrap: wrap;
    }
    #infoDisplay .freq-row span {
      background: rgba(255,255,255,0.04);
      padding: 2px 12px;
      border-radius: 20px;
    }
    #infoDisplay .empty-state {
      color: rgba(255,255,255,0.2);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* ─── KEYBOARD ─── */
    .keyboard {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .key {
      width: 64px;
      height: 150px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.04);
      transition: background 0.2s, transform 0.1s, border-color 0.2s;
      padding-bottom: 18px;
      letter-spacing: 0.04em;
      position: relative;
    }
    .key:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    .key:active {
      transform: translateY(2px) scale(0.97);
    }
    .key .key-label {
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .key .chakra-dot {
      position: absolute;
      bottom: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.15;
      transition: opacity 0.3s;
    }
    .key:hover .chakra-dot { opacity: 0.4; }

    /* ─── CONTROLS ─── */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f0ece4;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .controls button:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    .controls button:active { transform: scale(0.96); }
    .controls button.toggle-on {
      background: rgba(120,200,255,0.12);
      border-color: rgba(120,200,255,0.25);
      color: #a8d8ff;
    }
    .controls button.toggle-off {
      background: rgba(255,100,100,0.08);
      border-color: rgba(255,100,100,0.15);
      color: #ff9999;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .status-dot.on {
      background: #78c8ff;
      box-shadow: 0 0 12px rgba(120,200,255,0.4);
    }
    .status-dot.off { background: #555; }

    @media (max-width: 600px) {
      .lens-wrapper { width: 180px; height: 180px; }
      .key { width: 48px; height: 110px; font-size: 1rem; padding-bottom: 12px; }
      #infoDisplay { padding: 14px 16px; min-height: 90px; }
      #infoDisplay .note-badge { font-size: 1.4rem; }
      .controls button { padding: 8px 16px; font-size: 0.75rem; }
    }
    @media (max-width: 420px) {
      .key { width: 40px; height: 90px; font-size: 0.85rem; padding-bottom: 8px; border-radius: 8px; }
      .keyboard { gap: 4px; }
      .lens-wrapper { width: 150px; height: 150px; }
    }
  </style>
</head>
<body>

  <div class="app-title">✦ Chakra Light Lens ✦</div>

  <div class="lens-wrapper">
    <div class="lens-ring"></div>
    <div id="colorCircle">
      <div id="chakraSymbol"></div>
    </div>
  </div>

  <div id="infoDisplay"><div class="empty-state">press a key to illuminate</div></div>

  <div class="keyboard" id="keyboard"></div>

  <div class="controls">
    <button id="speechToggle" class="toggle-on">
      <span class="status-dot on" id="speechDot"></span>
      <span id="speechLabel">Speech On</span>
    </button>
    <button id="resetSpoken"><span>↻</span> Reset Spoken Notes</button>
  </div>

  <script>
    const synth = new Tone.Synth().toDestination();

    const chakraData = {
      "C": { 
        name: "root", 
        sanskrit: "Muladhara",
        colorName: "deep red", 
        lightFreq: "430", 
        lore: "ground your life force and awaken the dormant Kundalini energy at the base of the spine, fostering profound stability and survival.",
        svg: `<svg viewBox="0 0 100 100">
                <rect x="30" y="30" width="40" height="40" stroke="white" stroke-width="2" fill="none"/>
                <polygon points="50,65 35,35 65,35" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="50" cy="50" r="42" stroke="white" stroke-width="1.5" stroke-dasharray="8 6" fill="none"/>
              </svg>`
      },
      "D": { 
        name: "sacral", 
        sanskrit: "Svadhishthana",
        colorName: "vibrant orange", 
        lightFreq: "480", 
        lore: "unlock the waters of creativity and emotional balance, harmonizing the vital flow of Prana within the body.",
        svg: `<svg viewBox="0 0 100 100">
                <path d="M50 15 C45 35, 55 35, 50 15 Z" transform="rotate(0 50 50)" stroke="white" stroke-width="2" fill="none"/>
                <path d="M50 15 C45 35, 55 35, 50 15 Z" transform="rotate(60 50 50)" stroke="white" stroke-width="2" fill="none"/>
                <path d="M50 15 C45 35, 55 35, 50 15 Z" transform="rotate(120 50 50)" stroke="white" stroke-width="2" fill="none"/>
                <path d="M50 15 C45 35, 55 35, 50 15 Z" transform="rotate(180 50 50)" stroke="white" stroke-width="2" fill="none"/>
                <path d="M50 15 C45 35, 55 35, 50 15 Z" transform="rotate(240 50 50)" stroke="white" stroke-width="2" fill="none"/>
                <path d="M50 15 C45 35, 55 35, 50 15 Z" transform="rotate(300 50 50)" stroke="white" stroke-width="2" fill="none"/>
                <path d="M 50 28 A 22 22 0 1 0 72 50 A 17 17 0 1 1 50 28" stroke="white" stroke-width="2" fill="none"/>
              </svg>`
      },
      "E": { 
        name: "solar plexus", 
        sanskrit: "Manipura",
        colorName: "radiant yellow", 
        lightFreq: "510", 
        lore: "ignite the inner fire of personal power and transformation, burning away impurities to illuminate your true will.",
        svg: `<svg viewBox="0 0 100 100">
                <polygon points="50,75 25,30 75,30" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="50" cy="50" r="30" stroke="white" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>
                <circle cx="50" cy="50" r="42" stroke="white" stroke-width="1.5" stroke-dasharray="10 4" fill="none"/>
              </svg>`
      },
      "F": { 
        name: "heart", 
        sanskrit: "Anahata",
        colorName: "emerald green", 
        lightFreq: "560", 
        lore: "open the unstruck sound of universal love, bridging the lower and higher realms of consciousness with boundless compassion.",
        svg: `<svg viewBox="0 0 100 100">
                <polygon points="50,18 22,66 78,66" stroke="white" stroke-width="2" fill="none"/>
                <polygon points="50,82 22,34 78,34" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="50" cy="50" r="42" stroke="white" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
              </svg>`
      },
      "G": { 
        name: "throat", 
        sanskrit: "Vishuddha",
        colorName: "sapphire blue", 
        lightFreq: "630", 
        lore: "purify your expression and align your voice with cosmic truth, allowing the nectar of clarity to flow freely.",
        svg: `<svg viewBox="0 0 100 100">
                <polygon points="50,78 22,30 78,30" stroke="white" stroke-width="1.8" fill="none"/>
                <circle cx="50" cy="45" r="18" stroke="white" stroke-width="1.8" fill="none"/>
                <circle cx="50" cy="50" r="42" stroke="white" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
              </svg>`
      },
      "A": { 
        name: "third eye", 
        sanskrit: "Ajna",
        colorName: "indigo", 
        lightFreq: "670", 
        lore: "awaken the inner gaze of intuition and wisdom, piercing through the illusion of Maya to perceive ultimate reality.",
        svg: `<svg viewBox="0 0 100 100">
                <path d="M50 50 C20 20, 20 80, 50 50 Z" stroke="white" stroke-width="2" fill="none"/>
                <path d="M50 50 C80 20, 80 80, 50 50 Z" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="50" cy="50" r="22" stroke="white" stroke-width="2" fill="none"/>
                <polygon points="50,68 34,41 66,41" stroke="white" stroke-width="1.8" fill="none"/>
                <circle cx="50" cy="48" r="4" fill="white"/>
              </svg>`
      },
      "B": { 
        name: "crown", 
        sanskrit: "Sahasrara",
        colorName: "violet", 
        lightFreq: "750", 
        lore: "dissolve the boundaries of the ego and connect to the infinite, blooming the thousand-petaled lotus of pure consciousness.",
        svg: `<svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="42" stroke="white" stroke-width="1" stroke-dasharray="4 2" fill="none"/>
                <circle cx="50" cy="50" r="34" stroke="white" stroke-width="1.2" stroke-dasharray="6 3" fill="none"/>
                <circle cx="50" cy="50" r="26" stroke="white" stroke-width="1.5" stroke-dasharray="8 4" fill="none"/>
                <circle cx="50" cy="50" r="18" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="50" cy="50" r="6" fill="white"/>
              </svg>`
      }
    };

    const baseHues = { "C": 0, "D": 30, "E": 60, "F": 120, "G": 180, "A": 240, "B": 270 };
    const FIXED_OCTAVE = 4;

    let speechEnabled = true;
    const spokenNotes = new Set();
    let currentNote = null;
    let speechTimeout = null;

    const circle = document.getElementById('colorCircle');
    const symbolContainer = document.getElementById('chakraSymbol');
    const infoDisplay = document.getElementById('infoDisplay');
    const keyboardEl = document.getElementById('keyboard');
    const speechToggle = document.getElementById('speechToggle');
    const speechDot = document.getElementById('speechDot');
    const speechLabel = document.getElementById('speechLabel');
    const resetBtn = document.getElementById('resetSpoken');

    function getNoteFrequency(letter) {
      const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
      const idx = notes.indexOf(letter);
      if (idx === -1) return 0;
      const midi = (FIXED_OCTAVE + 1) * 12 + idx;
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function hslStr(h, l) { return `hsl(${h}, 100%, ${l}%)`; }

    function getLensGradient(hue, lightness) {
      const bright = `hsl(${hue}, 100%, ${Math.min(lightness + 15, 92)}%)`;
      const mid = `hsl(${hue}, 100%, ${lightness}%)`;
      const dark = `hsl(${hue}, 100%, ${Math.max(lightness - 30, 8)}%)`;
      return `radial-gradient(circle at 32% 28%, rgba(255,255,255,0.92) 0%, ${bright} 18%, ${mid} 48%, ${dark} 78%, rgba(0,0,0,0.55) 100%)`;
    }

    function getGlowColor(hue, lightness) {
      return `hsl(${hue}, 100%, ${Math.min(lightness + 20, 90)}%)`;
    }

    function setLensOff() {
      circle.style.background = '#0a0a0f';
      circle.style.boxShadow = 'none';
      circle.style.filter = 'none';
      circle.classList.remove('active');
      symbolContainer.innerHTML = '';
    }

    function setLensOn(letter) {
      const hue = baseHues[letter];
      const light = 55 + (Math.random() * 6 - 3);
      const grad = getLensGradient(hue, light);
      const glow = getGlowColor(hue, light);

      circle.style.setProperty('--active-grad', grad);
      circle.style.setProperty('--glow-color', glow);

      if (chakraData[letter] && chakraData[letter].svg) {
        symbolContainer.innerHTML = chakraData[letter].svg;
      }

      circle.classList.add('active');
    }

    function renderInfo(letter, isSpoken) {
      const data = chakraData[letter];
      if (!data) return;
      const freq = getNoteFrequency(letter);
      const hue = baseHues[letter];
      const colorHex = hslStr(hue, 55);
      const badge = isSpoken ? '<span style="color:rgba(255,255,255,0.25);font-size:0.7rem;margin-left:8px;">✓ spoken</span>' : '';
      
      infoDisplay.innerHTML = `
        <div><span class="note-badge">${letter}</span>${badge}</div>
        <div class="chakra-name" style="color:${colorHex};">
          ${data.name} <span style="font-size: 0.9em; opacity: 0.8; font-style: italic;">(${data.sanskrit})</span> · ${data.colorName}
        </div>
        <div class="freq-row">
          <span>🎵 ${freq.toFixed(2)} Hz</span>
          <span>💡 ${data.lightFreq} THz</span>
        </div>
        <div class="lore">${data.lore}</div>
      `;
    }

    function renderEmpty() {
      infoDisplay.innerHTML = `<div class="empty-state">press a key to illuminate</div>`;
    }

    function speakNarration(letter, callback) {
      if (!speechEnabled) { if(callback) callback(); return; }
      const data = chakraData[letter];
      const freq = getNoteFrequency(letter);
      const text = `Note ${letter}, at a frequency of ${freq.toFixed(2)} Hertz, paired with the spectral color frequency of ${data.lightFreq} Terahertz, which our eyes interpret as ${data.colorName}, targeting your ${data.name} chakra, traditionally called ${data.sanskrit}, in a clinical setting with powerful amplification will ${data.lore}`;
      
      if (typeof responsiveVoice !== 'undefined' && responsiveVoice.cancel) responsiveVoice.cancel();
      if (typeof responsiveVoice !== 'undefined' && responsiveVoice.speak) {
        responsiveVoice.speak(text, "Australian Male", {
          rate: 0.95,
          pitch: 1.0,
          onend: () => { if(callback) callback(); },
          onerror: () => { if(callback) callback(); }
        });
      } else { if(callback) callback(); }
    }

    function handleKeyDown(letter) {
      if (speechTimeout) { clearTimeout(speechTimeout); speechTimeout = null; }
      synth.triggerRelease();
      const noteWithOctave = letter + FIXED_OCTAVE;
      synth.triggerAttack(noteWithOctave);
      currentNote = letter;
      setLensOn(letter);
      const alreadySpoken = spokenNotes.has(letter);
      renderInfo(letter, alreadySpoken);
    }

    function handleKeyUp(letter) {
      synth.triggerRelease();
      const alreadySpoken = spokenNotes.has(letter);
      const shouldSpeak = speechEnabled && !alreadySpoken;

      if (shouldSpeak) {
        speakNarration(letter, () => {
          spokenNotes.add(letter);
          renderInfo(letter, true);
          setLensOff();
          currentNote = null;
          speechTimeout = null;
        });
        speechTimeout = setTimeout(() => {
          if (currentNote === letter) {
            setLensOff();
            currentNote = null;
            spokenNotes.add(letter);
            renderInfo(letter, true);
            speechTimeout = null;
          }
        }, 8000);
      } else {
        setLensOff();
        renderInfo(letter, alreadySpoken);
        currentNote = null;
      }
    }

    function buildKeyboard() {
      keyboardEl.innerHTML = '';
      ['C','D','E','F','G','A','B'].forEach(letter => {
        const key = document.createElement('div');
        key.className = 'key';
        key.dataset.note = letter;
        const hue = baseHues[letter];
        key.style.borderColor = `hsl(${hue}, 100%, 30%)`;
        const label = document.createElement('span');
        label.className = 'key-label';
        label.textContent = letter;
        key.appendChild(label);
        const dot = document.createElement('span');
        dot.className = 'chakra-dot';
        dot.style.color = `hsl(${hue}, 100%, 55%)`;
        key.appendChild(dot);

        key.addEventListener('mousedown', (e) => { e.preventDefault(); handleKeyDown(letter); });
        key.addEventListener('mouseup', (e) => { e.preventDefault(); if (currentNote === letter) handleKeyUp(letter); });
        key.addEventListener('mouseleave', () => { if (currentNote === letter) handleKeyUp(letter); });
        key.addEventListener('touchstart', (e) => { e.preventDefault(); handleKeyDown(letter); }, { passive: false });
        key.addEventListener('touchend', (e) => { e.preventDefault(); if (currentNote === letter) handleKeyUp(letter); }, { passive: false });

        keyboardEl.appendChild(key);
      });
    }

    speechToggle.addEventListener('click', () => {
      speechEnabled = !speechEnabled;
      updateSpeechUI();
      if (!speechEnabled) {
        if (typeof responsiveVoice !== 'undefined' && responsiveVoice.cancel) responsiveVoice.cancel();
        if (speechTimeout) { clearTimeout(speechTimeout); speechTimeout = null; }
        setLensOff();
        if (currentNote) { renderInfo(currentNote, spokenNotes.has(currentNote)); currentNote = null; }
        else renderEmpty();
      }
    });

    function updateSpeechUI() {
      if (speechEnabled) {
        speechToggle.className = 'toggle-on';
        speechDot.className = 'status-dot on';
        speechLabel.textContent = 'Speech On';
      } else {
        speechToggle.className = 'toggle-off';
        speechDot.className = 'status-dot off';
        speechLabel.textContent = 'Speech Off';
      }
    }

    resetBtn.addEventListener('click', () => {
      spokenNotes.clear();
      if (currentNote) renderInfo(currentNote, false);
      else renderEmpty();
      if (typeof responsiveVoice !== 'undefined' && responsiveVoice.cancel) responsiveVoice.cancel();
      if (speechTimeout) { clearTimeout(speechTimeout); speechTimeout = null; }
      if (!currentNote) setLensOff();
    });

    // ─── INIT ───
    buildKeyboard();
    setLensOff();
    renderEmpty();
    updateSpeechUI();

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && currentNote) {
        synth.triggerRelease();
        setLensOff();
        if (speechTimeout) { clearTimeout(speechTimeout); speechTimeout = null; }
        renderInfo(currentNote, spokenNotes.has(currentNote));
        currentNote = null;
      }
    });

    window.addEventListener('beforeunload', () => {
      if (typeof responsiveVoice !== 'undefined' && responsiveVoice.cancel) responsiveVoice.cancel();
      synth.triggerRelease();
    });
  </script>
</body>
</html>
