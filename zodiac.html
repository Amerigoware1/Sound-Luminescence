<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zodiac — Earth‑Centric Astrology</title>
    <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon" />
    <style>
        /* ===== Reset & Body ===== */
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            background-color: #0a0a12;
            color: #e2daeb;
        }

        /* ===== Sidebar Info Panel (Left) ===== */
        #sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            width: 220px;
            max-height: calc(100vh - 40px);
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #2a1f3d;
            border-radius: 16px;
            padding: 20px;
            z-index: 10;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }
        #sidebar::-webkit-scrollbar {
            width: 2px;
        }
        #sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: #9d4edd;
            border-radius: 10px;
        }

        #sidebar h2 {
            margin: 0 0 6px 0;
            font-size: 1.1rem;
            font-weight: normal;
            color: #c77dff;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a1f3d;
            padding-bottom: 8px;
        }
        #sidebar .subtitle {
            font-size: 0.7rem;
            color: #a092b8;
            margin-top: -4px;
            margin-bottom: 12px;
        }
        #sidebar hr {
            border: none;
            border-top: 1px solid #1f1a2e;
            margin: 10px 0;
        }

        .planet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(42, 31, 61, 0.3);
        }
        .planet-row .symbol {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }
        .planet-row .name {
            flex: 1;
            padding-left: 6px;
            color: #cbd5e1;
        }
        .planet-row .sign {
            font-weight: bold;
            color: #fff;
        }
        .planet-row .status {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }
        .planet-row .status.retrograde {
            color: #f87171;
            background: rgba(248, 113, 113, 0.15);
        }
        .planet-row .status.direct {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        #datetime {
            font-size: 0.8rem;
            font-family: monospace;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        #user-info {
            font-size: 0.85rem;
            color: #e2daeb;
            margin-bottom: 8px;
        }
        #user-info .highlight {
            color: #c77dff;
        }

        /* ===== Back Button (Top Right) ===== */
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(20, 16, 30, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #e2daeb;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid #3c2f5c;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            transition: all 0.25s ease-in-out;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }
        .back-btn:hover {
            background: #9d4edd;
            color: #fff;
            border-color: #c77dff;
            box-shadow: 0 0 24px rgba(157, 78, 221, 0.3);
        }

        /* ===== Canvas ===== */
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ===== Responsive tweaks ===== */
        @media (max-width: 768px) {
            #sidebar {
                left: 10px;
                top: 10px;
                width: 160px;
                padding: 12px;
                font-size: 0.7rem;
            }
            #sidebar h2 {
                font-size: 0.9rem;
            }
            .planet-row {
                font-size: 0.7rem;
            }
            .back-btn {
                top: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar">
        <h2>✦ Celestial Watch</h2>
        <div id="datetime">Loading time…</div>
        <div id="user-info">Welcome, Traveller</div>

        <hr />

        <div id="planetary-info">
            <!-- Planet rows will be injected here -->
        </div>

        <hr />
        <div style="font-size:0.65rem; color:#4a3c5c; text-align:center; margin-top:6px;">
            ⚡ Real-time astronomical data
        </div>
    </div>

    <!-- ===== BACK BUTTON ===== -->
    <a href="digital-divination.html" class="back-btn">← Back to Altar</a>

    <!-- ===== CANVAS ===== -->
    <canvas id="canvas"></canvas>

    <script>
        // =============================================================
        // 1. SETUP & CONFIG
        // =============================================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H, cx, cy, radius;

        // Zodiac signs (fixed 30° segments from 0° Aries)
        const zodiacSigns = [
            { symbol: '♈', name: 'Aries', start: 0 },
            { symbol: '♉', name: 'Taurus', start: 30 },
            { symbol: '♊', name: 'Gemini', start: 60 },
            { symbol: '♋', name: 'Cancer', start: 90 },
            { symbol: '♌', name: 'Leo', start: 120 },
            { symbol: '♍', name: 'Virgo', start: 150 },
            { symbol: '♎', name: 'Libra', start: 180 },
            { symbol: '♏', name: 'Scorpio', start: 210 },
            { symbol: '♐', name: 'Sagittarius', start: 240 },
            { symbol: '♑', name: 'Capricorn', start: 270 },
            { symbol: '♒', name: 'Aquarius', start: 300 },
            { symbol: '♓', name: 'Pisces', start: 330 }
        ];

        function getZodiacSign(angleDeg) {
            const normalized = ((angleDeg % 360) + 360) % 360;
            for (let i = 0; i < zodiacSigns.length; i++) {
                const start = zodiacSigns[i].start;
                const end = start + 30;
                if (normalized >= start && normalized < end) {
                    return zodiacSigns[i];
                }
            }
            return zodiacSigns[0];
        }

        // Planet configuration (radii slightly enlarged to comfortably hold centered symbols)
        const planetsConfig = {
            Sun: { color: '#FFD700', textFill: '#0a0a12', radius: 18, label: '☉', name: 'Sun' },
            Moon: { color: '#D1D5DB', textFill: '#0a0a12', radius: 14, label: '☽', name: 'Moon' },
            Mercury: { color: '#B5B5B5', textFill: '#0a0a12', radius: 12, label: '☿', name: 'Mercury' },
            Venus: { color: '#E0A96D', textFill: '#0a0a12', radius: 13, label: '♀', name: 'Venus' },
            Mars: { color: '#FF5722', textFill: '#ffffff', radius: 12, label: '♂', name: 'Mars' },
            Jupiter: { color: '#DAA520', textFill: '#0a0a12', radius: 16, label: '♃', name: 'Jupiter' },
            Saturn: { color: '#B8860B', textFill: '#ffffff', radius: 15, label: '♄', name: 'Saturn' }
        };

        const distances = {
            Sun: 1.0,
            Moon: 0.35,
            Mercury: 0.55,
            Venus: 0.75,
            Mars: 1.3,
            Jupiter: 2.4,
            Saturn: 3.4
        };

        // =============================================================
        // 2. RESIZE
        // =============================================================
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            radius = Math.min(W, H) * 0.38;
        }
        window.addEventListener('resize', resize);
        resize();

        // =============================================================
        // 3. REAL-TIME ASTRONOMICAL CALCULATIONS
        // =============================================================
        function getDaysSinceJ2000(date = new Date()) {
            return (date.getTime() - Date.UTC(2000, 0, 1, 12, 0, 0)) / 86400000;
        }

        function toRad(deg) { return deg * Math.PI / 180; }
        function toDeg(rad) { return rad * 180 / Math.PI; }
        function normDeg(deg) { return ((deg % 360) + 360) % 360; }

        function calculateBodyPositions(date = new Date()) {
            const d = getDaysSinceJ2000(date);

            // Earth Heliocentric
            const Me = toRad(normDeg(357.529 + 0.98560028 * d));
            const ve = Me + toRad(1.915 * Math.sin(Me) + 0.020 * Math.sin(2 * Me));
            const Le = normDeg(toDeg(ve) + 102.937);
            const re = 1.00014 - 0.01671 * Math.cos(Me);
            const xE = re * Math.cos(toRad(Le));
            const yE = re * Math.sin(toRad(Le));

            // Sun Geocentric Longitude
            const sunLong = normDeg(Le + 180);

            // Keplerian orbital Elements (approximate)
            const el = {
                Mercury: { a: 0.3871, e: 0.2056, L: 252.25 + 4.09233 * d, w: 77.46 + 0.00004 * d },
                Venus:   { a: 0.7233, e: 0.0068, L: 181.98 + 1.60213 * d, w: 131.57 + 0.00002 * d },
                Mars:    { a: 1.5237, e: 0.0934, L: 355.45 + 0.52403 * d, w: 336.04 + 0.00005 * d },
                Jupiter: { a: 5.2026, e: 0.0485, L: 34.40  + 0.08309 * d, w: 14.73  + 0.00004 * d },
                Saturn:  { a: 9.5549, e: 0.0555, L: 49.94  + 0.03346 * d, w: 92.60  + 0.00005 * d }
            };

            const positions = { Sun: sunLong };

            // Calculate planets geocentric longitudes
            Object.keys(el).forEach(key => {
                const p = el[key];
                const M = toRad(normDeg(p.L - p.w));
                const v = M + toRad((2 * p.e - Math.pow(p.e, 3) / 4) * Math.sin(M) + 1.25 * Math.pow(p.e, 2) * Math.sin(2 * M));
                const r = p.a * (1 - Math.pow(p.e, 2)) / (1 + p.e * Math.cos(v));
                const l = normDeg(toDeg(v) + p.w);

                const xH = r * Math.cos(toRad(l));
                const yH = r * Math.sin(toRad(l));

                const xG = xH - xE;
                const yG = yH - yE;

                positions[key] = normDeg(toDeg(Math.atan2(yG, xG)));
            });

            // Moon Geocentric Longitude
            const Lm = normDeg(218.316 + 13.176396 * d);
            const Mm = toRad(normDeg(134.963 + 13.064993 * d));
            const Ms = toRad(normDeg(357.529 + 0.9856003 * d));
            const D  = toRad(normDeg(297.850 + 12.190749 * d));
            const F  = toRad(normDeg(93.272  + 13.229350 * d));

            const moonLong = normDeg(
                Lm +
                6.289 * Math.sin(Mm) +
                1.274 * Math.sin(2 * D - Mm) +
                0.658 * Math.sin(2 * D) +
                0.214 * Math.sin(2 * Mm) -
                0.185 * Math.sin(Ms) -
                0.114 * Math.sin(2 * F)
            );

            positions.Moon = moonLong;
            return positions;
        }

        // Determine retrograde status by computing velocity over a tiny time delta
        function getRetrogradeStatuses() {
            const now = new Date();
            const future = new Date(now.getTime() + 6 * 3600 * 1000); // 6 hours later

            const pos1 = calculateBodyPositions(now);
            const pos2 = calculateBodyPositions(future);

            const retro = {};
            Object.keys(pos1).forEach(key => {
                let diff = pos2[key] - pos1[key];
                if (diff < -180) diff += 360;
                if (diff > 180) diff -= 360;
                retro[key] = diff < 0;
            });
            return retro;
        }

        // =============================================================
        // 4. DRAWING MOON PHASE
        // =============================================================
        function drawMoonWithPhase(ctx, x, y, radius, phaseAngleRad) {
            ctx.save();
            ctx.translate(x, y);

            // Dark side base
            ctx.fillStyle = '#22252a';
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, 2 * Math.PI);
            ctx.fill();

            // Illumination calculations
            const phi = phaseAngleRad;
            const cosPhi = Math.cos(phi);

            ctx.fillStyle = '#e2e8f0';
            ctx.beginPath();

            // Right side illuminated (Waxing) or Left side (Waning)
            if (Math.sin(phi) >= 0) {
                // Waxing: arc right half
                ctx.arc(0, 0, radius, -Math.PI / 2, Math.PI / 2, false);
                ctx.ellipse(0, 0, Math.abs(radius * cosPhi), radius, 0, Math.PI / 2, -Math.PI / 2, cosPhi < 0);
            } else {
                // Waning: arc left half
                ctx.arc(0, 0, radius, Math.PI / 2, -Math.PI / 2, false);
                ctx.ellipse(0, 0, Math.abs(radius * cosPhi), radius, 0, -Math.PI / 2, Math.PI / 2, cosPhi >= 0);
            }
            ctx.fill();

            ctx.restore();
        }

        // =============================================================
        // 5. RENDER CANVAS
        // =============================================================
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Background gradient
            const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.8);
            bg.addColorStop(0, '#1a1a2e');
            bg.addColorStop(1, '#0a0a12');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            ctx.translate(cx, cy);

            // ---- Zodiac Ring ----
            const zodiacRadius = radius * 1.2;
            ctx.strokeStyle = '#2a1f3d';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, zodiacRadius, 0, 2 * Math.PI);
            ctx.stroke();

            // Draw zodiac segments and labels
            zodiacSigns.forEach((sign) => {
                const startAngle = (sign.start - 90) * Math.PI / 180;
                const endAngle = (sign.start + 30 - 90) * Math.PI / 180;

                ctx.strokeStyle = '#3c2f5c';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, zodiacRadius, startAngle, endAngle);
                ctx.stroke();

                const midAngle = (startAngle + endAngle) / 2;
                const labelR = zodiacRadius + 24;
                const x = labelR * Math.cos(midAngle);
                const y = labelR * Math.sin(midAngle);

                ctx.fillStyle = '#b0a4c4';
                ctx.font = '16px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${sign.symbol}`, x, y - 12);
                ctx.font = '9px Georgia';
                ctx.fillText(sign.name, x, y + 12);
            });

            // ---- Ecliptic grid lines ----
            for (let i = 0; i < 36; i++) {
                const angle = (i * 10) * Math.PI / 180;
                ctx.strokeStyle = 'rgba(30, 20, 40, 0.3)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(zodiacRadius * 1.3 * Math.cos(angle), zodiacRadius * 1.3 * Math.sin(angle));
                ctx.stroke();
            }

            // Real positions calculation
            const positions = calculateBodyPositions();
            const planetKeys = Object.keys(planetsConfig);

            // Phase angle for Moon calculation
            const moonPhaseAngleRad = toRad(normDeg(positions.Moon - positions.Sun));

            // ---- Render Bodies ----
            planetKeys.forEach((key) => {
                const config = planetsConfig[key];
                const angleRad = (positions[key] - 90) * Math.PI / 180;
                const dist = distances[key] * radius * 0.3;

                const x = dist * Math.cos(angleRad);
                const y = dist * Math.sin(angleRad);

                // Glow
                const glow = ctx.createRadialGradient(x, y, 0, x, y, config.radius * 2.5);
                glow.addColorStop(0, config.color + '55');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, config.radius * 2.5, 0, 2 * Math.PI);
                ctx.fill();

                // Body rendering (special rendering for Moon phase)
                if (key === 'Moon') {
                    drawMoonWithPhase(ctx, x, y, config.radius, moonPhaseAngleRad);
                } else {
                    ctx.shadowColor = config.color;
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = config.color;
                    ctx.beginPath();
                    ctx.arc(x, y, config.radius, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // CENTERED SYMBOL ON BODY
                ctx.shadowBlur = 0;
                // High contrast color for symbols over moon phase
                ctx.fillStyle = (key === 'Moon') ? '#a3e635' : config.textFill;
                ctx.font = `bold ${Math.round(config.radius * 1.15)}px Georgia`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(config.label, x, y);
            });

            // ---- Earth centre marker ----
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#4ade8040';
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, 2 * Math.PI);
            ctx.fill();

            ctx.fillStyle = '#e2daeb';
            ctx.font = '12px Georgia';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('🌍 Earth', 0, 10);

            ctx.restore();
        }

        // =============================================================
        // 6. SIDEBAR UPDATE
        // =============================================================
        const planetDisplayOrder = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];

        function updateSidebar() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            const timeStr = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('datetime').innerHTML =
                `🕒 ${dateStr}<br><span style="font-size:0.7rem; color:#6a5c7c;">${timeStr} (your local time)</span>`;

            const userName = localStorage.getItem('user-name') || 'Traveller';
            const userBirthday = localStorage.getItem('user-birthday');
            let userInfoHtml = `👤 <span class="highlight">${userName}</span>`;
            if (userBirthday) {
                const bday = new Date(userBirthday + 'T00:00:00');
                const bdayStr = bday.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                userInfoHtml += ` &middot; 🎂 ${bdayStr}`;
            }
            document.getElementById('user-info').innerHTML = userInfoHtml;

            const positions = calculateBodyPositions();
            const retrogrades = getRetrogradeStatuses();

            let html = '';
            planetDisplayOrder.forEach((key) => {
                const config = planetsConfig[key];
                const angle = positions[key];
                const sign = getZodiacSign(angle);
                const retro = retrogrades[key];

                const statusClass = retro ? 'retrograde' : 'direct';
                const statusText = retro ? '⟲ Retro' : '⟳ Direct';

                html += `
                    <div class="planet-row">
                        <span class="symbol">${config.label}</span>
                        <span class="name">${config.name}</span>
                        <span class="sign">${sign.symbol} ${sign.name}</span>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                `;
            });
            document.getElementById('planetary-info').innerHTML = html;
        }

        // =============================================================
        // 7. REAL-TIME TICK LOOP
        // =============================================================
        function tick() {
            draw();
            updateSidebar();
            requestAnimationFrame(tick);
        }

        // Start real-time updates
        requestAnimationFrame(tick);

        console.log('✨ Astrology Watcher initialized with real astronomical data.');
    </script>
</body>
</html>
