<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac — Earth‑Centric Astrology</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #c8b87a;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1 {
    margin-top: 24px;
    font-size: 1.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e8d48b;
    text-shadow: 0 0 12px rgba(232,212,139,.4);
  }
  .subtitle {
    font-size: .85rem;
    color: #7a7a9a;
    margin: 4px 0 8px;
    letter-spacing: 2px;
  }
  #clock {
    font-size: .95rem;
    color: #9a9abf;
    margin-bottom: 12px;
    font-variant-numeric: tabular-nums;
  }
  #chart-container {
    position: relative;
    width: min(90vw, 700px);
    height: min(90vw, 700px);
  }
  svg { width: 100%; height: 100%; }
  .back-link {
    margin: 20px 0 30px;
    color: #7a7a9a;
    text-decoration: none;
    font-size: .9rem;
    letter-spacing: 1px;
    transition: color .3s;
  }
  .back-link:hover { color: #e8d48b; }

  /* Moon phase canvas */
  #moon-phase-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  #moon-canvas { display: block; margin: 0 auto 4px; }
  #moon-label {
    font-size: .7rem;
    color: #9a9abf;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>✦ Celestial Watch</h1>
<p class="subtitle">Real-Time Geocentric Positions</p>
<div id="clock">Loading time…</div>

<div id="chart-container">
  <svg id="zodiac-svg" viewBox="0 0 700 700"></svg>
  <div id="moon-phase-box">
    <canvas id="moon-canvas" width="60" height="60"></canvas>
    <div id="moon-label">Moon Phase</div>
  </div>
</div>

<a class="back-link" href="digital-divination.html">[← Back to Altar]</a>

<script>
/* ── Constants ─────────────────────────────────────────── */
const CX = 350, CY = 350;
const R_OUTER = 320, R_SIGN = 290, R_PLANET = 240, R_INNER = 200;
const DEG = Math.PI / 180;

const SIGNS = [
  { sym: '♈', name: 'Aries' },       { sym: '♉', name: 'Taurus' },
  { sym: '♊', name: 'Gemini' },      { sym: '♋', name: 'Cancer' },
  { sym: '♌', name: 'Leo' },         { sym: '♍', name: 'Virgo' },
  { sym: '♎', name: 'Libra' },       { sym: '♏', name: 'Scorpio' },
  { sym: '♐', name: 'Sagittarius' }, { sym: '♑', name: 'Capricorn' },
  { sym: '♒', name: 'Aquarius' },    { sym: '♓', name: 'Pisces' }
];

const BODIES = [
  { id: 'sun',     sym: '☉', color: '#ffd966', name: 'Sun' },
  { id: 'moon',    sym: '☽', color: '#d0d0e8', name: 'Moon' },
  { id: 'mercury', sym: '☿', color: '#b0b0c0', name: 'Mercury' },
  { id: 'venus',   sym: '♀', color: '#e8a0c0', name: 'Venus' },
  { id: 'mars',    sym: '♂', color: '#e06040', name: 'Mars' },
  { id: 'jupiter', sym: '♃', color: '#d4a050', name: 'Jupiter' },
  { id: 'saturn',  sym: '♄', color: '#a09060', name: 'Saturn' },
  { id: 'uranus',  sym: '♅', color: '#60c0d0', name: 'Uranus' },
  { id: 'neptune', sym: '♆', color: '#5070d0', name: 'Neptune' }
];

/* ── Julian Date ───────────────────────────────────────── */
function toJD(d) {
  let y = d.getUTCFullYear(), m = d.getUTCMonth() + 1, day = d.getUTCDate();
  const h = d.getUTCHours() + d.getUTCMinutes()/60 + d.getUTCSeconds()/3600;
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + day + h/24 + B - 1524.5;
}

/* ── Simplified Geocentric Longitudes (low-precision) ── */
function norm(deg) { return ((deg % 360) + 360) % 360; }

function bodyLongitude(jd, id) {
  const T = (jd - 2451545.0) / 36525; // centuries since J2000
  const d = jd - 2451545.0;           // days since J2000

  switch(id) {
    case 'sun':
      // Mean longitude of Sun ≈ Earth's + 180
      return norm(280.46646 + 36000.76983 * T + 0.0003032 * T*T);

    case 'moon': {
      // Simplified mean longitude
      const L0 = norm(218.3165 + 13.176396 * d);
      const M  = norm(134.9634 + 13.064993 * d);
      const F  = norm(93.2720  + 13.229350 * d);
      const D  = norm(297.8502 + 12.190749 * d);
      return norm(L0
        + 6.289 * Math.sin(M * DEG)
        - 1.274 * Math.sin((2*D - M) * DEG)
        + 0.658 * Math.sin(2*D * DEG)
        + 0.214 * Math.sin(2*M * DEG)
        - 0.186 * Math.sin((35.75 + 0.9856*d) * DEG) // solar term approx
        - 0.114 * Math.sin(2*F * DEG));
    }

    case 'mercury':
      return norm(252.2509 + 149472.6746 * T);
    case 'venus':
      return norm(181.9798 + 58517.8157 * T);
    case 'mars':
      return norm(355.4330 + 19140.2993 * T);
    case 'jupiter':
      return norm(34.3515 + 3034.9057 * T);
    case 'saturn':
      return norm(50.0774 + 1222.1138 * T);
    case 'uranus':
      return norm(314.0550 + 428.4677 * T);
    case 'neptune':
      return norm(304.3487 + 218.4862 * T);
    default:
      return 0;
  }
}

/* ── Moon Phase (0 = new, 0.5 = full) ────────────────── */
function moonPhase(jd) {
  const d = jd - 2451550.1;
  const synodic = 29.530588853;
  return ((d % synodic) + synodic) % synodic / synodic;
}

/* ── Draw Static Chart ─────────────────────────────────── */
const svg = document.getElementById('zodiac-svg');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function drawStatic() {
  // Background glow
  const defs = el('defs', {});
  const rg = el('radialGradient', { id: 'bg', cx: '50%', cy: '50%', r: '50%' });
  rg.appendChild(el('stop', { offset: '0%', 'stop-color': '#14143a' }));
  rg.appendChild(el('stop', { offset: '100%', 'stop-color': '#0a0a1a' }));
  defs.appendChild(rg);
  svg.appendChild(defs);
  svg.appendChild(el('circle', { cx: CX, cy: CY, r: R_OUTER + 10, fill: 'url(#bg)' }));

  // Outer ring
  svg.appendChild(el('circle', { cx: CX, cy: CY, r: R_OUTER, fill: 'none', stroke: '#3a3a5a', 'stroke-width': 1 }));
  svg.appendChild(el('circle', { cx: CX, cy: CY, r: R_SIGN, fill: 'none', stroke: '#2a2a4a', 'stroke-width': .5 }));
  svg.appendChild(el('circle', { cx: CX, cy: CY, r: R_INNER, fill: 'none', stroke: '#2a2a4a', 'stroke-width': .5 }));

  // Sign divisions & labels
  for (let i = 0; i < 12; i++) {
    const a1 = (i * 30 - 90) * DEG;
    const a2 = ((i + 1) * 30 - 90) * DEG;
    const amid = ((i * 30 + 15) - 90) * DEG;

    // Division line
    svg.appendChild(el('line', {
      x1: CX + R_INNER * Math.cos(a1), y1: CY + R_INNER * Math.sin(a1),
      x2: CX + R_OUTER * Math.cos(a1), y2: CY + R_OUTER * Math.sin(a1),
      stroke: '#3a3a5a', 'stroke-width': .7
    }));

    // Sign symbol
    const sr = (R_OUTER + R_SIGN) / 2;
    const tx = el('text', {
      x: CX + sr * Math.cos(amid), y: CY + sr * Math.sin(amid),
      fill: '#7a7a9a', 'font-size': '20', 'text-anchor': 'middle', 'dominant-baseline': 'central'
    });
    tx.textContent = SIGNS[i].sym;
    svg.appendChild(tx);
  }
}
drawStatic();

/* ── Draw / Update Bodies ──────────────────────────────── */
const bodyEls = {};

function initBodies() {
  BODIES.forEach(b => {
    const g = el('g', { id: 'g-' + b.id });

    // Glow dot
    g.appendChild(el('circle', {
      r: 6, fill: b.color, opacity: .35, class: 'glow'
    }));
    // Solid dot
    g.appendChild(el('circle', {
      r: 3, fill: b.color
    }));
    // Symbol — centered on the body
    const t = el('text', {
      x: 0, y: 0,
      fill: b.color,
      'font-size': '18',
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      'font-weight': 'bold',
      dy: '-14'            // nudge above the dot so it doesn't overlap
    });
    t.textContent = b.sym;
    g.appendChild(t);

    svg.appendChild(g);
    bodyEls[b.id] = g;
  });
}
initBodies();

function updatePositions() {
  const now = new Date();
  const jd = toJD(now);

  document.getElementById('clock').textContent =
    '⚡ ' + now.toUTCString().replace('GMT', 'UTC');

  BODIES.forEach(b => {
    const lon = bodyLongitude(jd, b.id);
    // Astrological convention: 0° Aries at 3-o'clock, counter-clockwise
    const angle = (lon - 90) * DEG;
    const x = CX + R_PLANET * Math.cos(angle);
    const y = CY + R_PLANET * Math.sin(angle);
    bodyEls[b.id].setAttribute('transform', `translate(${x},${y})`);
  });

  drawMoonPhase(jd);
}

/* ── Moon Phase Rendering ──────────────────────────────── */
function drawMoonPhase(jd) {
  const phase = moonPhase(jd);
  const canvas = document.getElementById('moon-canvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const r = 26, cx = w/2, cy = h/2;
  ctx.clearRect(0, 0, w, h);

  // Dark side
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();
  ctx.strokeStyle = '#4a4a6a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Lit side
  ctx.beginPath();
  const sweep = phase * 2 * Math.PI;
  // Draw illuminated portion using two arcs
  ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI, false); // left half boundary
  const k = Math.cos(sweep);
  ctx.ellipse(cx, cy, Math.abs(k) * r, r, 0, -Math.PI/2 + Math.PI, -Math.PI/2, k > 0);
  ctx.fillStyle = '#e8e0c8';
  ctx.fill();

  // Phase label
  let label = '';
  if (phase < 0.03 || phase > 0.97) label = 'New Moon';
  else if (phase < 0.22) label = 'Waxing Crescent';
  else if (phase < 0.28) label = 'First Quarter';
  else if (phase < 0.47) label = 'Waxing Gibbous';
  else if (phase < 0.53) label = 'Full Moon';
  else if (phase < 0.72) label = 'Waning Gibbous';
  else if (phase < 0.78) label = 'Last Quarter';
  else label = 'Waning Crescent';
  document.getElementById('moon-label').textContent = label;
}

/* ── Real-Time Loop (updates every 30 s, no fast-forward) */
updatePositions();
setInterval(updatePositions, 30000);
</script>
</body>
</html>
