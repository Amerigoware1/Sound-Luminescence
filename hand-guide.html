<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmistry Guide — Digital Divination</title>
    <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0d0b14;
        }

        .hand-table {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0d0b14;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <!-- Close Button -->
    <button onclick="window.close()" style="
      position: fixed;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid #3c2f5c;
      background: rgba(13, 11, 20, 0.85);
      color: #e2daeb;
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 9999;
      backdrop-filter: blur(4px);
      transition: background 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    " onmouseover="this.style.background='#9d4edd'; this.style.transform='scale(1.05)'" onmouseout="this.style.background='rgba(13,11,20,0.85)'; this.style.transform='scale(1)'">
      ✕
    </button>

    <!-- The Interactive Board Canvas Workspace -->
    <div class="hand-table" id="hand-board"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const repoPath = window.location.pathname.includes('/Sound-Luminescence/') ? '/Sound-Luminescence/' : '';
            const board = document.getElementById('hand-board');
            if (board) {
                board.style.backgroundImage = `url('${repoPath}assets/misc/palm-reading-diagram-illustrated.webp')`;
            }
        });
    </script>
</body>

</html>
