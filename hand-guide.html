<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypnotic — Digital Divination</title>
    <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0d0b14;
        }

        /* Fixed Aspect Ratio Interactive Board Canvas */
        .hand-table {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;

            /* Background configuration */
            background-size: contain;
            /* Changed from cover to contain */
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <!-- The Interactive Board Canvas Workspace -->
    <div class="hand-table" id="hand-board"></div>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // FIX 1: Use '' (relative path) instead of '/' as the fallback. 
            // This ensures it works locally (file://) and at the root of any domain.
            const repoPath = window.location.pathname.includes('/Sound-Luminescence/') ? '/Sound-Luminescence/' : '';

            // Target the board and paint your specialized layout texture
            const board = document.getElementById('hand-board');
            if (board) {
                board.style.backgroundImage = `url('${repoPath}assets/misc/palm-reading-diagram-illustrated.webp')`;
            }
        });
    </script>
</body>

</html>
