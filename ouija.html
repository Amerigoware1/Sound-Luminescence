<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Talking Board — Digital Divination</title>
  <link rel="icon" href="assets/misc/divination-icon.ico" type="image/x-icon">
  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0d0b14;
      cursor: none; /* Hide default cursor for the custom JS cursor */
    }

    /* Fixed Aspect Ratio Interactive Board Canvas */
    .ouija-table {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    
    /* Background configuration */
    background-size: contain; /* Changed from cover to contain */
    background-position: center;
    background-repeat: no-repeat;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
    }

    /* Subtle Return Anchor Overlay */
    .altar-navigation {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
    }

  .return-btn {
      /*cursor: none;*/
      background-color: rgba(20, 16, 30, 0.85);
      color: #e2daeb;
      border: 1px solid #3c2f5c;
      padding: 20px 10px;
      position: fixed;
      top: 50px;
      right: 110px;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(1, 255, 242, 0.25);
      transition: all 0.2s ease-in-out;
      opacity: 0.1;                  /* start invisible */
      transition: opacity 0.6s ease-in-out, background-color 0.2s, border-color 0.2s;
      pointer-events: auto;        /* still detectable */
      /* If you want it to not block clicks when hidden, use pointer-events: none; but then hover won't work */
    }

    .return-btn:hover {
      opacity: .75;                  /* appear on hover */
      background-color: #9d4edd;
      color: #fff;
      border-color: #c77dff;
      box-shadow: 0 0 40px rgba(157, 78, 221, 0.5);
    }
  </style>
</head>
<body>

  <!-- Return to Main Dashboard -->
  <div class="altar-navigation">
    <a href="digital-divination.html" class="return-btn">← Return</a>
  </div>

  <!-- The Interactive Board Canvas Workspace -->
  <div class="ouija-table" id="talking-board"></div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // FIX 1: Use '' (relative path) instead of '/' as the fallback. 
      // This ensures it works locally (file://) and at the root of any domain.
      const repoPath = window.location.pathname.includes('/Sound-Luminescence/') ? '/Sound-Luminescence/' : '';
      
      // Target the board and paint your specialized layout texture
      const board = document.getElementById('talking-board');
      if (board) {
        board.style.backgroundImage = `url('${repoPath}assets/cloths/cloth-10.webp')`;
      }

      // FIX 2: Use a JS-driven custom cursor to bypass strict browser size limits (32px-128px max).
      // This guarantees your "super-sized" cursor will render correctly on all devices.
      const customCursor = document.createElement('img');
      customCursor.src = `${repoPath}assets/misc/pointer.webp`;
      customCursor.style.position = 'fixed';
      customCursor.style.top = '0';
      customCursor.style.left = '0';
      customCursor.style.width = '256px'; // Adjust to your desired super-sized dimension
      customCursor.style.height = '256px';
      customCursor.style.pointerEvents = 'none'; // Crucial: lets clicks pass through to elements below
      customCursor.style.zIndex = '10000';
      customCursor.style.transform = 'translate(-50%, -80%)'; // Centers the image on the mouse tip
      document.body.appendChild(customCursor);

      // Track mouse movement to update cursor position
      window.addEventListener('mousemove', (e) => {
        customCursor.style.left = `${e.clientX}px`;
        customCursor.style.top = `${e.clientY}px`;
      });
    });
  </script>
</body>
</html>
